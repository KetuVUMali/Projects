<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>InteriorX - Home</title>
  <link rel="stylesheet" href="style.css">
  <script defer src="script.js"></script>
</head>
<body>

  <!-- Navbar -->
  <header>
    <nav class="navbar">
      <div class="logo"><a href="home.html">InteriorX</a></div>
      <ul class="nav-links">
        <li><a href="home.html">Home</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="contact.html">Contact</a></li>
      </ul>
      <button class="popup-btn">Get Quote</button>
    </nav>
  </header>

  <!-- Hero Section -->
  <section class="hero">
    <h1>Transform Your Home with <span>InteriorX</span></h1>
    <p>Designs that make you feel at home</p>
    <button class="explore-btn">Explore More</button>
  </section>

  <!-- Popup -->
  <div class="popup">
    <div class="popup-content">
      <h2>Get a Free Quote</h2>
      <p>Enter your details to get started</p>
      <input type="text" placeholder="Your Name">
      <input type="email" placeholder="Your Email">
      <button class="close-popup">Close</button>
    </div>
  </div>

</body>
</html>
