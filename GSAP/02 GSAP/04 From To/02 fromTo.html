<!DOCTYPE html>
<html>

<head>
    <title>GSAP FromTo</title>
    <style>
        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .box {
            width: 100px;
            height: 100px;
            background: #f97316;
        }
    </style>
</head>

<body>

    <div class="box"></div>

    <script src="https://unpkg.com/gsap@3/dist/gsap.min.js"></script>

    <script>
        gsap.fromTo(
            ".box",
            { scale: 0.5, rotate: 40 },
            { scale: 2, duration: 3, rotate: 0 }
        );
    </script>

</body>

</html>
