<!DOCTYPE html>
<html>
<head>
<style>
body {
  height: 200vh;
}
  .div{
    margin-top: 200px;
    padding: 50px;
  }

.box {
  width: 100px;
  height: 100px;
  background: red;
  margin-top: 200px;
}
</style>
</head>
<body>
    <div class="div"> </div>

<div class="box"></div>

<script src="https://unpkg.com/gsap@3/dist/gsap.min.js"></script>
<script src="https://unpkg.com/gsap@3/dist/ScrollTrigger.min.js"></script>

<script>
gsap.to(".box", {
  x: 300,
  scrollTrigger: {
    trigger: ".box",
    start: "top center",                    // When the top of the box hits the center of the viewport
    end: "bottom top",                      // When the bottom of the box hits the top of the viewport
    scrub: 1
  }
});
</script>

<div>
    <pre>
    

    </pre>
</div>

</body>
</html>
