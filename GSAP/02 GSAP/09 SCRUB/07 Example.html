<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>GSAP Parallax with Scrub</title>

<style>
/* Page height so scrolling is possible */
body {
  margin: 0;
  font-family: Arial, sans-serif;
}

/* Spacer sections */
.spacer {
  height: 100vh;
  background: #f2f2f2;
}

/* Parallax section */
.parallax-section {
  position: relative;
  height: 100vh;
  overflow: hidden;
}

/* Background image */
.parallax-bg {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 120%;
  background-image: url("https://picsum.photos/1200/800");
  background-size: cover;
  background-position: center;
}

/* Content on top */
.parallax-content {
  position: relative;
  z-index: 2;
  height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
  font-size: 48px;
  background: rgba(0, 0, 0, 0.3);
}
</style>
</head>

<body>

<div class="spacer"></div>

<section class="parallax-section">
  <div class="parallax-bg"></div>
  <div class="parallax-content">
    Parallax with GSAP Scrub
  </div>
</section>

<div class="spacer"></div>

<script src="https://unpkg.com/gsap@3/dist/gsap.min.js"></script>
<script src="https://unpkg.com/gsap@3/dist/ScrollTrigger.min.js"></script>

<script>
gsap.registerPlugin(ScrollTrigger);

gsap.to(".parallax-bg", {
  y: -200,
  scrollTrigger: {
    trigger: ".parallax-section",
    start: "top bottom",
    end: "bottom top",
    scrub: true
  }
});
</script>

</body>
</html>
