<!DOCTYPE html>
<html>
<head>
<style>
body {
  height: 200vh;
}

.box {
  width: 120px;
  height: 120px;
  background: blue;
  margin: 200px auto;
}
</style>
</head>
<body>

<div class="box"></div>

<script src="https://unpkg.com/gsap@3/dist/gsap.min.js"></script>
<script src="https://unpkg.com/gsap@3/dist/ScrollTrigger.min.js"></script>

<script>
gsap.registerPlugin(ScrollTrigger);

gsap.fromTo(".box",
  { opacity: 0 },
  {
    opacity: 1,
    scrollTrigger: {
      trigger: ".box",
      start: "top 80%",
      end: "top 20%",
      scrub: true
    }
  }
);
</script>

<div>
    <pre>
        🧠 Logic :
                Scroll down → box fades in
                Scroll up → box fades out
                Very common in content websites
    </pre>
</div>

</body>
</html>
