<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Scroll 3D Card Animation</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family: Arial, sans-serif;
  background:#111;
  overflow-x:hidden;
}

.section{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  position:relative;
  perspective:1200px;
}

.cards{
  display:flex;
  gap:40px;
}

.card{
  width:220px;
  height:320px;
  position:relative;
  transform-style:preserve-3d;
}

.card-inner{
  width:100%;
  height:100%;
  position:relative;
  transform-style:preserve-3d;
}

.card-front,
.card-back{
  position:absolute;
  width:100%;
  height:100%;
  backface-visibility:hidden;
  border-radius:15px;
  overflow:hidden;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:20px;
  font-weight:bold;
}

.card-front{
  background-size:cover;
  background-position:center;
}

.card-back{
  background:white;
  color:black;
  transform:rotateY(180deg);
  padding:20px;
  text-align:center;
}

.spacer{
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  color:white;
  font-size:30px;
}
</style>
</head>

<body>

<div class="section">
  <div class="cards">

    <div class="card">
      <div class="card-inner">
        <div class="card-front" style="background:url('https://picsum.photos/300/400?1')"></div>
        <div class="card-back">Card 1 Text</div>
      </div>
    </div>

    <div class="card">
      <div class="card-inner">
        <div class="card-front" style="background:url('https://picsum.photos/300/400?2')"></div>
        <div class="card-back">Card 2 Text</div>
      </div>
    </div>

    <div class="card">
      <div class="card-inner">
        <div class="card-front" style="background:url('https://picsum.photos/300/400?3')"></div>
        <div class="card-back">Card 3 Text</div>
      </div>
    </div>

    <div class="card">
      <div class="card-inner">
        <div class="card-front" style="background:url('https://picsum.photos/300/400?4')"></div>
        <div class="card-back">Card 4 Text</div>
      </div>
    </div>

  </div>
</div>

<div class="spacer">Scroll Back Up ↑</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.13.0/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.13.0/ScrollTrigger.min.js"></script>

<script>
gsap.registerPlugin(ScrollTrigger);

const tl = gsap.timeline({
  scrollTrigger:{
    trigger: ".section",
    start: "top top",
    end: "+=400%",
    scrub: true,
    pin: true
  }
});

// 1️⃣ Rotate to backside
tl.to(".card-inner", {
  rotateY: 180,
  stagger: 0.2,
  ease:"none"
});

// 2️⃣ Rotate back to front
tl.to(".card-inner", {
  rotateY: 360,
  stagger: 0.2,
  ease:"none"
});

// 3️⃣ Move downward with different rotations
tl.to(".card", {
  y: 300,
  rotate: (i)=> (i % 2 === 0 ? -20 : 20),
  stagger: 0.2,
  ease:"none"
});
</script>

</body>
</html>
