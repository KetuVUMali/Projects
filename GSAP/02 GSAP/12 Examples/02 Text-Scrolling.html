<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Scrolling Text Animation</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body{
            font-family: Arial, sans-serif;
            overflow-x: hidden;
        }

        .container1{
            position: relative;
            height: 100vh;
            overflow: hidden;
        }

        .text{
            font-size: 5rem;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            font-weight: 600;
            text-transform: uppercase;
            position: absolute;
            top: 0;
            left: 0;
            opacity: 0;
            transform: scale(0.5);
        }

        .text1{
            opacity: 1;
            transform: scale(1);
        }

        .container2{
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
        }

    </style>
</head>

<body>

<div class="container1">
    <div class="text text1">Scrolling Effect</div>
    <div class="text text2">Zoom In</div>
    <div class="text text3">Animation</div> 
</div>

<div class="container2">
    <p>Completed</p>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.13.0/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.13.0/ScrollTrigger.min.js"></script>

<script>
    gsap.registerPlugin(ScrollTrigger);

    const tl = gsap.timeline({
        scrollTrigger:{
            trigger: ".container1",
            start: "top top",
            end: "+=300%",
            scrub: true,
            pin: true
        }
    });

    tl.to(".text1", {
        scale: 20,
        opacity: 0,
        ease: "none"
    })

    .to(".text2", {
        scale: 1,
        opacity: 1,
        ease: "none"
    }, "<")

    .to(".text2", {
        scale: 20,
        opacity: 0,
        ease: "none"
    })

    .to(".text3", {
        scale: 1,
        opacity: 1,
        ease: "none"
    }, "<");
</script>

</body>
</html>
