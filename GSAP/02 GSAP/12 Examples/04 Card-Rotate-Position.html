<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Scroll Card Animation Final</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #111;
            font-family: Arial;
            overflow-x: hidden;
        }

        .section {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            perspective: 1000px;
        }

        .cards {
            display: flex;
            gap: 40px;
        }

        .card {
            width: 200px;
            height: 300px;
            position: relative;
            transform-style: preserve-3d;
        }

        .card-inner {
            width: 100%;
            height: 100%;
            transform-style: preserve-3d;
        }

        .card-front,
        .card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 15px;
            backface-visibility: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 20px;
            font-weight: bold;
        }

        .card-front {
            background-size: cover;
            background-position: center;
        }

        .card-back {
            background: white;
            color: black;
            transform: rotateY(180deg);
        }

        .spacer {
            height: 100vh;
        }
    </style>
</head>

<body>

    <div class="section">
        <div class="cards">

            <div class="card card1">
                <div class="card-inner">
                    <div class="card-front" style="background:url('https://picsum.photos/300/400?1')"></div>
                    <div class="card-back">Card 1 Text</div>
                </div>
            </div>

            <div class="card card2">
                <div class="card-inner">
                    <div class="card-front" style="background:url('https://picsum.photos/300/400?2')"></div>
                    <div class="card-back">Card 2 Text</div>
                </div>
            </div>

            <div class="card card3">
                <div class="card-inner">
                    <div class="card-front" style="background:url('https://picsum.photos/300/400?3')"></div>
                    <div class="card-back">Card 3 Text</div>
                </div>
            </div>

            <div class="card card4">
                <div class="card-inner">
                    <div class="card-front" style="background:url('https://picsum.photos/300/400?4')"></div>
                    <div class="card-back">Card 4 Text</div>
                </div>
            </div>

        </div>
    </div>

    <div class="spacer" style="background-color: aliceblue;"> End of Page</div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.13.0/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.13.0/ScrollTrigger.min.js"></script>

    <script>
        gsap.registerPlugin(ScrollTrigger);

        /*
          MAIN TIMELINE
        */
        const tl = gsap.timeline({
            scrollTrigger: {
                trigger: ".section",
                start: "top top",
                end: "+=400%",
                scrub: true,
                pin: true
            }
        });

        /* 1️⃣ IMAGE → TEXT */
        tl.to(".card-inner", {
            rotateY: 180,
            stagger: 0.2,
            ease: "none"
        });

        /* 2️⃣ TEXT → IMAGE */
        tl.to(".card-inner", {
            rotateY: 360,
            stagger: 0.2,
            ease: "none"
        });

        /* 3️⃣ MOVE DOWN + DIFFERENT POSITIONS + DIFFERENT ROTATIONS */
        /* 
           Easy to edit here 👇
        */
        tl.to(".card1", {
            x: -250,
            y: 200,
            rotate: -30,
            ease: "none"
        });

        tl.to(".card2", {
            x: -120,
            y: 200,
            rotate: 15,
            ease: "none"
        }, "<");   // "<" means start same time

        tl.to(".card3", {
            x: 150,
            y: 200,
            rotate: -20,
            ease: "none"
        }, "<");

        tl.to(".card4", {
            x: 280,
            y: 200,
            rotate: 30,
            ease: "none"
        }, "<");

    </script>

</body>

</html>
