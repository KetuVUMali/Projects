<!DOCTYPE html>
<html>
<head>
<style>
.box {
  width: 100px;
  height: 100px;
  background: teal;
  margin: 40px;
}
</style>
</head>
<body>

<div class="box"></div>
<p id="msg"></p>

<script src="https://unpkg.com/gsap@3/dist/gsap.min.js"></script>
<script>
gsap.to(".box", {
  x: 300,
  duration: 2,
  onComplete: () => {
    document.getElementById("msg").innerText = "Animation Completed!";
  }
});
</script>


</body>
</html>
