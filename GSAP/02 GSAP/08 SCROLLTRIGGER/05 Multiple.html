<!DOCTYPE html>
<html>

<head>
    <style>
        .section {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .section1 {
            background: #f1c40f;
        }

        .section2 {
            background: #2ecc71;
        }

        .section3 {
            background: #3498db;
        }

        .box {
            width: 100px;
            height: 100px;
            background: black;
        }
    </style>
</head>

<body>

    <div class="section section1">
        <div class="box box1"></div>
    </div>

    <div class="section section2">
        <div class="box box2"></div>
    </div>

    <div class="section section3">
        <div class="box box3"></div>
    </div>

    <script src="https://unpkg.com/gsap@3/dist/gsap.min.js"></script>
    <script src="https://unpkg.com/gsap@3/dist/ScrollTrigger.min.js"></script>
    <script>
        gsap.registerPlugin(ScrollTrigger);

        gsap.from(".box1", {
            y: 300,
            opacity: 0,
            scrollTrigger: ".box1"
        });

        gsap.from(".box2", {
            x: -150,
            scrollTrigger: ".box2"
        });

        gsap.from(".box3", {
            scale: 0,
            rotation: 180,
            scrollTrigger: ".box3"
        });
    </script>
    <div>
        <pre>
            Different animations for different sections
                Box 1: Fades in and moves up when it enters the viewport
                Box 2: Slides in from the left when it enters the viewport
                Box 3: Scales up and rotates into view when it enters the viewport
        </pre>
    </div>

</body>

</html>
