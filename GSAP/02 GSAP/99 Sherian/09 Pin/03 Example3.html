<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        html, body{
            height: 100%;
            width: 100%;
        }
        body{overflow-x: hidden;}
        #page1{
            height: 100%;
            width: 100%;
            background-color: rgb(201, 199, 77);
        }
        #page2{
            height: 100%;
            width: 100%;
            background-color: rgb(66, 189, 189);
            /* padding: 5vw 0; */
        }
        #page3{
            height: 100%;
            width: 100%;
            background-color: rgb(145, 227, 230);
        }
        #page4{
            height: 100%;
            width: 100%;
            background-color: rgb(226, 121, 203);
        }
        #page2 h1{
            font-size: 40vw;
            text-transform: uppercase;
            font-weight: 600;
        }
    </style>
</head>
<body>

    <div id="page1"></div>
    <div id="page2">
        <h1>HelloWorld</h1></h1>
    </div>
    <div id="page3"></div>
    <div id="page4"></div>
    
    <!-- GSAP CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.13.0/gsap.min.js" integrity="sha512-NcZdtrT77bJr4STcmsGAESr06BYGE8woZdSdEgqnpyqac7sugNO+Tr4bGwGF3MsnEkGKhU2KL2xh6Ec+BqsaHA==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    
    <!-- ScrollTrigger CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.13.0/ScrollTrigger.min.js" integrity="sha512-P2IDYZfqSwjcSjX0BKeNhwRUH8zRPGlgcWl5n6gBLzdi4Y5/0O4zaXrtO4K9TZK6Hn1BenYpKowuCavNandERg==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
   <script>
    gsap.to("#page2 h1", {
        transform:'translateX(-200%)',          // Text move from right to left
        scrollTrigger:{
            trigger: "#page2",
            scroller: "body",
            markers: true,
            start: "top 5%",                    //Animation start when section 10% scrolled down.
            end:"top -100%",                    // 
            scrub: 2,
            pin: true
        }
    })
   </script>
</body>
</html>
