<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .box1{            
            width: 100px;
            height: 100px;
            background-color: rgb(0, 4, 255);
        }
        .box2{
            width: 100px;
            height: 100px;
            background-color: rgb(0, 255, 0);
        }
        .box3{
            width: 100px;
            height: 100px;
            background-color: rgb(255, 153, 0);
        }
    </style>
</head>
<body>

    <h3>Normal</h3>

    <div >
        <div class="box1"></div>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.13.0/gsap.min.js" integrity="sha512-NcZdtrT77bJr4STcmsGAESr06BYGE8woZdSdEgqnpyqac7sugNO+Tr4bGwGF3MsnEkGKhU2KL2xh6Ec+BqsaHA==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <script>
        gsap.to(".box1", {
            x: 1000,
            duration: 3,
            delay: 1,
            rotate:360,
            backgroundColor:"red",
            borderRadius:"50%"
                                            // No Repeat Animation
        });
    </script>

    <h3>Repeat:1</h3>
    <div class="box2"></div>
    <script>
        gsap.to(".box2", {
            x: 1000,
            duration: 3,
            delay: 1,
            rotate:360,
            backgroundColor:"red",
            borderRadius:"50%",
            repeat:1                                // Repeat Animation 2 times
        });
    </script>


    <h3>Repeat: Infinity </h3>
    <div class="box3"></div>
    <script>
        gsap.to(".box3", {
            x: 1000,
            duration: 3,
            delay: 1,
            rotate:360,
            backgroundColor:"red",
            borderRadius:"50%",
            repeat:-1                               // Repeat Animation Infinite Times
        });
    </script>

    <pre>
        Now Infinity Animation Repeat Infinite Times
        but it is only one side repeat then we wont both side repeat not single side repeat.
        Then Used "yoyo" property to reverse direction after each cycle.
    </pre>
    
</body>
</html>
