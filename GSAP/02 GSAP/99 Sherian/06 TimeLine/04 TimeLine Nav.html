<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            background: black;

        }
        #nav{
                /* background: red; */
                color: white;
                display: flex;
                justify-content: space-between;
                align-items: center;
                padding: 30px 50px;
        }
        .part2{
            display: flex;
            gap: 50px;
        }
        

    </style>
</head>
<body>
    <div id="nav">
        <h2> Logo </h2>
        <div class="part2">
            <h4>Home</h4>
            <h4>About</h4>
            <h4>Contact</h4>
            <h4>Blog</h4>
            <h4>Portfolio</h4>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.13.0/gsap.min.js" integrity="sha512-NcZdtrT77bJr4STcmsGAESr06BYGE8woZdSdEgqnpyqac7sugNO+Tr4bGwGF3MsnEkGKhU2KL2xh6Ec+BqsaHA==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <script>
        var tl = gsap.timeline();
        tl.from("h2", {
            y: -30,
            opacity:0,
            duration:  1.5,                        // Normal
            delay: 1
        });
        tl.from("h4", {
            y: -30,
            opacity:0,
            // rotate:360,
            duration: 1.5,    
            stagger: 0.3
        });

    </script>
    
    
</body>
</html>
