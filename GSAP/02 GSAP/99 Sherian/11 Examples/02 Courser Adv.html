<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cursor Program</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        } 

        html, body{
            height: 100%;
            width: 100%;
            overflow: hidden;
        }

        #main{
            height: 100%;
            width: 100%;
            background-color: black;
            display: flex;
            align-items: center;
            justify-content: center;;
        }
        #cursor{
            height: 20px;
            width: 20px;
            background-color: white;
            border-radius: 50%;
            position: fixed;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 5px;
            z-index: 9;
            text-align: center;
        }


        #overplay{
            background-color: transparent;
            height: 100%;
            width: 100%;
            position: absolute;
            z-index: 10;
        }

        #image{
            height: 30vw;
            width: 60vw;
            /* background-color: red; */
            position: relative;
        }

        #image img{
            height: 100%;
            width: 100%;
            object-fit: cover;
        }
    </style>
</head>
<body>
    <div id="cursor"></div>
    <div id="main">
        <div id="image">
            <div id="overplay"></div>
            <img src="https://images2.alphacoders.com/136/thumb-1920-1362335.jpeg" alt="">
        </div>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.13.0/gsap.min.js" integrity="sha512-NcZdtrT77bJr4STcmsGAESr06BYGE8woZdSdEgqnpyqac7sugNO+Tr4bGwGF3MsnEkGKhU2KL2xh6Ec+BqsaHA==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
</body>
<script>
    var main = document.querySelector('#main');
    var cursor = document.querySelector('#cursor');

    main.addEventListener('mousemove', function(dets){
        gsap.to(cursor, {
            duration: 0.5,
            x: dets.x,
            y: dets.y,
            // ease: "back.out"
        });
    });

    var imageDiv = document.querySelector('#image');

    imageDiv.addEventListener("mouseenter", function(){
        cursor.innerHTML = "view More"
        gsap.to(cursor, {
            scale:4,
            backgroundColor:'#ffffff8a'
        })
    })

    imageDiv.addEventListener("mouseleave", function(){
        cursor.innerHTML = ""
        gsap.to(cursor, {
            scale:1,
            backgroundColor:'#fff'
        })
    })
</script>
</html>
