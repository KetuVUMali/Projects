<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>GSAP Responsive Scroll Example</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- GSAP -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>

    <style>
      body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #111;
        color: white;
        overflow-x: hidden;
      }

      .spacer {
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: clamp(1.5rem, 4vw, 2.5rem);
      }

      /* ---------- FIRST SECTION ---------- */

      #pin-windmill-wrap {
        height: 300vh;
      }

      #pin-windmill {
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #1f1f1f;
        position: relative;
        overflow: hidden;
      }

      #pin-windmill-svg {
        width: 20vw;
        max-width: 200px;
        height: auto;
        position: absolute;
        z-index: 2;
      }

      .scroll-content {
        position: absolute;
        width: 100%;
      }

      .text-block {
        height: 100vh;
        display: flex;
        align-items: center;
        padding: 0 10%;
        font-size: clamp(1.2rem, 4vw, 2rem);
      }

      .left {
        justify-content: flex-start;
      }

      .right {
        justify-content: flex-end;
      }

      /* ---------- SECOND SECTION ---------- */

      #vertical-move-wrap {
        height: 200vh;
      }

      #vertical-move-section {
        height: 100vh;
        background: #1a1a2e;
        display: flex;
        align-items: center;
        justify-content: center;
        position: relative;
        overflow: hidden;
      }

      #spinning-box {
        width: 20vw;
        max-width: 150px;
        aspect-ratio: 1 / 1;
        background: #00f5d4;
        border-radius: 20px;
        position: absolute;
        left: 50%;
        transform: translateX(-50%);
      }
    </style>
  </head>
  <body>
    <div class="spacer">Scroll Down 👇</div>

    <!-- ================= FIRST SECTION ================= -->

    <div id="pin-windmill-wrap">
      <div id="pin-windmill">
        <div class="scroll-content">
          <div class="text-block left">Section 1 - Left</div>
          <div class="text-block right">Section 2 - Right</div>
          <div class="text-block left">Section 3 - Left</div>
        </div>

        <svg id="pin-windmill-svg" viewBox="0 0 100 100">
          <circle cx="50" cy="50" r="8" fill="white" />
          <rect x="48" y="10" width="4" height="40" fill="white" />
          <rect x="48" y="50" width="4" height="40" fill="white" />
          <rect x="10" y="48" width="40" height="4" fill="white" />
          <rect x="50" y="48" width="40" height="4" fill="white" />
        </svg>
      </div>
    </div>

    <div class="spacer">Next Section 👇</div>

    <!-- ================= SECOND SECTION ================= -->

    <div id="vertical-move-wrap">
      <div id="vertical-move-section">
        <div id="spinning-box"></div>
      </div>
    </div>

    <div class="spacer">End 👏</div>

    <script>
      gsap.registerPlugin(ScrollTrigger);

      /* ---------- FIRST SECTION ---------- */

      const totalBlocks = document.querySelectorAll(".text-block").length;

      const tl1 = gsap.timeline({
        scrollTrigger: {
          trigger: "#pin-windmill",
          start: "top top",
          end: "+=" + totalBlocks * 100 + "%",
          scrub: 1,
          pin: true,
        },
      });

      // Rotate windmill
      tl1.to(
        "#pin-windmill-svg",
        {
          rotate: 900,
          ease: "none",
        },
        0,
      );

      // Scroll text dynamically
      tl1.to(
        ".scroll-content",
        {
          y: -(totalBlocks - 1) * 100 + "vh",
          ease: "none",
        },
        0,
      );

      /* ---------- SECOND SECTION ---------- */

      const tl2 = gsap.timeline({
        scrollTrigger: {
          trigger: "#vertical-move-section",
          start: "top top",
          end: "+=150%",
          scrub: 1,
          pin: true,
        },
      });

      // Step 1 → Right → Center
      tl2
        .fromTo(
          "#spinning-box",
          {
            xPercent: 420, // start outside right
            yPercent: -200, // start slightly above
            rotate: -360,
          },
          {
            xPercent: 0, // center horizontally
            yPercent: 0, // move down
            rotate: 0,
            ease: "none",
            duration: 1,
          },
        )

        // Step 2 → Center → Right
        .to("#spinning-box", {
          xPercent: -420, // go back right
          yPercent: 200, // continue moving downward
          rotate: 360,
          ease: "none",
          duration: 1,
        });
    </script>
  </body>
</html>
