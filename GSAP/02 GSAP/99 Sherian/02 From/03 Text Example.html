<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        h3{
            color: black;
        }

        nav li{
            color: green;
        }
    </style>
</head>
<body>
    
    <h3>Hello World!, I am Web Designer</h3>
    <h3>Hello World!, I am Frontend Developer</h3>
    
    <nav>
        <li><a href="#">Home</a></li>       <br>
        <li><a href="#">About</a></li>      <br>
        <li><a href="#">Contact</a></li>    <br>
        <li><a href="#">Blog</a></li>       <br>
    </nav>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.13.0/gsap.min.js" integrity="sha512-NcZdtrT77bJr4STcmsGAESr06BYGE8woZdSdEgqnpyqac7sugNO+Tr4bGwGF3MsnEkGKhU2KL2xh6Ec+BqsaHA==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <script>
        gsap.from("h3", {
            color: "red",
            duration: 2,
            delay:1
        });

        gsap.from("nav li", {
            opacity: 0,
            duration: 2,
            delay:1,
            y:30,

        });
    </script>

    <pre>
        Note : 
                   All Text Display At Same Time
                   Then we used Stagger Animation To Display One By One Text
    </pre>
</body>
</html>
