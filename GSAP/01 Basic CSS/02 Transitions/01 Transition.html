<!DOCTYPE html>
<html>

<head>
    <style>
        .box {
            width: 120px;
            height: 120px;
            background: purple;
            transition: transform 0.6s;
        }

        /* No animation concept, just transition */
        .box:hover {
            transform: translateX(100px);
        }
    </style>
</head>

<body>

    <div class="box"></div>

    <div style="margin-top:20px;">
        Transition :
                Transition controls how smooth the change happens.

                Without transition → instant jump
                With transition → smooth animation
                (Manage Animation Speed)

    </div>

</body>

</html>
