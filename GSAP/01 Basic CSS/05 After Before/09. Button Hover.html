<!DOCTYPE html>
<html>
<head>
  <style>
    button {
      position: relative;
      padding: 15px 30px;
      background: none;
      border: none;
      font-size: 18px;
      cursor: pointer;
    }

    button::before,
    button::after {
      content: "";
      position: absolute;
      width: 0;
      height: 2px;
      background: black;
      transition: 0.3s;
    }

    button::before {
      top: 0;
      left: 0;
    }

    button::after {
      bottom: 0;
      right: 0;
    }

    button:hover::before,
    button:hover::after {
      width: 100%;
    }
  </style>
</head>
<body>

<button>Hover Me</button>

</body>
</html>
<pre>
🔍 Explanation
        Borders are not real borders
        ::before = top line
        ::after = bottom line
        On hover → width grows from 0 → 100%
</pre>
