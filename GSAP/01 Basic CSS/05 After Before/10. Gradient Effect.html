<!DOCTYPE html>
<html>
<head>
  <style>
    .card {
      width: 300px;
      height: 200px;
      position: relative;
      overflow: hidden;
    }

    .card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .card::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(
        to top,
        rgba(0,0,0,0.7),
        transparent
      );
    }
  </style>
</head>
<body>

<div class="card">
  <img src="https://via.placeholder.com/300x200">
</div>

</body>
</html>
