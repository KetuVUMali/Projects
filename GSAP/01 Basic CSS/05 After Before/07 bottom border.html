<!DOCTYPE html>
<html>
<head>
  <style>
    .card {
      position: relative;
      width: 300px;
    }

    .card img {
      width: 100%;
    }

    .card::before {
      content: "";
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.5);
    }
  </style>
</head>
<body>

<div class="card">
  <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRLG3A-PPbg0lY_WzYCKTKRWmgbznBhKnfG9g&s" height="auto">
</div>

</body>
</html>
