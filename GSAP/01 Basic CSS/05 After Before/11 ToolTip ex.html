<!DOCTYPE html>
<html>
<head>
  <style>
    body{
      margin: 100px;
      padding: 100px;
    }
    .tooltip {
      position: relative;
      display: inline-block;
      cursor: pointer;
    }

    .tooltip::after {
      content: "This is a tooltip";
      position: absolute;
      bottom: 125%;
      left: 50%;
      transform: translateX(-50%);
      background: black;
      color: white;
      padding: 5px 10px;
      white-space: nowrap;
      opacity: 0;
      pointer-events: none;
      transition: 0.3s;
    }

    .tooltip:hover::after {
      opacity: 1;
    }
  </style>
</head>
<body>

<span class="tooltip">Hover me</span>

</body>
</html>
