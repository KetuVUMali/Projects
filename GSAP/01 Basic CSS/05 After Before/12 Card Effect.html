<!DOCTYPE html>
<html>
<head>
  <style>
    .card {
      position: relative;
      width: 300px;
      height: 200px;
      background: url("https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQD3khc_s71nt_rKgYrpgLIfzEGCSIpHA3CUA&s") center/cover;
      overflow: hidden;
      
    }

    .card::before {
      content: "";
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.7);
      transform: translateY(100%);
      transition: 0.4s;
    }

    .card:hover::before {
      transform: translateY(0);
    }
  </style>
</head>
<body>

<div class="card"></div>

</body>
</html>
