<!DOCTYPE html>
<html>
<head>
  <style>
    p::before {
      content: "";
      width: 10px;
      height: 10px;
      background: red;
      display: inline-block;
      margin-right: 8px;
    }
  </style>
</head>
<body>

  <p>Important Message</p>

</body>
</html>
<pre>
🔍 Explanation (Step-by-Step)
        content: "" → creates element
        display: inline-block → allows width & height
        Red square appears before text
</pre>
