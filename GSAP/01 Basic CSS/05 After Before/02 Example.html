<!DOCTYPE html>
<html>
<head>
  <title>Before After Basic</title>
  <style>
    h1::before {
      content: "🔥 ";
    }

    h1::after {
      content: " 🚀";
    }
  </style>
</head>
<body>

  <h1>Welcome Buddy</h1>

</body>
</html>

<pre>
🔍 What happens?
    🔥 appears before text
    🚀 appears after text
    HTML unchanged
    CSS adds content
</pre>
