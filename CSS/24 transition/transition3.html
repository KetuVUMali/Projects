<!DOCTYPE html>
<html>
<head>
<style> 
div {
  width: 100px;
  height: 100px;
  background: red;
  transition: width 5s, height 5s ,bg-color 4s, transform 2s;
}

div:hover {
  width: 300px;
  background-color: blueviolet;
  height: 300px;
  /* transform: skew(2,3); */
}
</style>
</head>
<body>

<h1>The transition Property</h1>

<p>Hover over the div element below, to see the transition effect:</p>

<div></div>

</body>
</html>
