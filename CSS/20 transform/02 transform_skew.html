<!DOCTYPE html>
<html>
<head>
	<title>Transform skew</title>
	<style type="text/css">
		*{
			margin: auto;
		}
		p{
			height: 200px;
			width: 200px;
			background-color: rgba(200,0,0,0.5);
		}
		.main{
			height: 200px;
			width: 200px;
			background-color: rgba(200,0,0,0.5);
			transform: skew(139deg,37deg);
		}
		.main1{
			
			height: 200px;
			width: 200px;
			background-color: rgba(200,0,0,0.5);
			transform: skew(139deg);
		}
		.main2{
			height: 200px;
			width: 200px;
			background-color: rgba(200,0,0,0.5);
			transform: skew(37deg);
		}
	</style>
</head>
<body>
	<h1> Give Rotation </h1>
	<p>The skewX() method skews an element along the X-axis by the given angle.</p>
	<br><br>
	<hr>
	<br><br><br><br><br>
	<div class="main">x & y axis  movement in Degree</div>
	<br><br><br><br><br>
	<hr>
	<br>
	<div class="main1">x axis horizontal movement in degree</div>
	<br><br>
	<hr>
	<br>
	<div class="main2">y axis vertical movement in degree</div>

</body>
</html>
