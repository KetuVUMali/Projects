<!DOCTYPE html>
<html>
<head>
	<title>Transform</title>
	<style type="text/css">
		*{
			margin: auto;
		}
		p{
			height: 200px;
			width: 200px;
			background-color: rgba(200,0,0,0.5);
		}
		.main{
			height: 200px;
			width: 200px;
			background-color: rgba(200,0,0,0.5);
			transform: scale(2,3);
		}
		.main1{
			
			height: 200px;
			width: 200px;
			background-color: rgba(200,0,0,0.5);
			transform: scalex(2);
		}
		.main2{
			height: 200px;
			width: 200px;
			background-color: rgba(200,0,0,0.5);
			transform: scaley(2);
		}
	</style>
</head>
<body>
	<h2> Increase & Decrease Size of Element.</h2>
	<h3> Size X Value = Content </h3>
	<p>The skewX() method skews an element along the X-axis by the given angle.</p>
	<br><br>
	<hr>
	<br><br><br><br><br><br><br><br><br><br><br><br><br>
	<div class="main">x & y axis  movement increase & Decrease in Degree</div>
	<br><br><br><br><br><br><br><br><br><br><br><br><br>
	<hr>
	<br>
	<div class="main1">x axis horizontal movement in degree</div>
	<br><br>
	<hr>
	<br><br><br><br><br><br><br><br>
	<div class="main2">y axis vertical movement in degree</div>
	<br><br><br><br><br><br><br><br><br><br><br><br>

</body>
</html>
