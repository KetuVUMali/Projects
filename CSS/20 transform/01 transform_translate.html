<!DOCTYPE html>
<html>
<head>
	<title>Transform transition</title>
	<style type="text/css">
		.main{
			
			height: 200px;
			width: 200px;
			background-color: rgba(200,0,0,0.5);
			transform: translate(100px,100px);
		}
		.main1{
			
			height: 200px;
			width: 200px;
			background-color: rgba(200,0,0,0.5);
			/*box-shadow:17px 11px 15px 16px #2b2626;*/
			/*transform: translate(343px,271px);*/
			/*transform: skew(139deg,37deg);*/
			/*transform: rotate(50deg);*/
			/*transform: scale(2);*/
			transform: translatex(100px);
		}
		.main2{
			
			height: 200px;
			width: 200px;
			background-color: rgba(200,0,0,0.5);
			/*box-shadow:17px 11px 15px 16px #2b2626;*/
			/*transform: translate(343px,271px);*/
			/*transform: skew(139deg,37deg);*/
			/*transform: rotate(50deg);*/
			/*transform: scale(2);*/
			transform: translatey(100px);
		}
	</style>
</head>
<body>
	<h1> Use to give alignment OR Change Position </h1>
	<hr>
	<div class="main">x & y axis  movement</div>
	<br><br>
	<br><br>
	<br><br>
	<br><br>
	<br><br>
	<hr>
	<div class="main1">x axis horizontal movement</div>
	<br><br>
	<hr>
	<div class="main2">y axis vertical movement</div>

</body>
</html>
