<!DOCTYPE html>
<html>
<head>
	<title>Transform</title>
	<style type="text/css">
		*{
			margin: auto;
		}
		p{
			height: 200px;
			width: 200px;
			background-color: rgba(200,0,0,0.5);
		}
		.main{
			height: 200px;
			width: 200px;
			background-color: rgba(200,0,0,0.5);
			transform: rotate(139deg);
		}
		.main1{
			
			height: 200px;
			width: 200px;
			background-color: rgba(200,0,0,0.5);
			transform: rotatex(139deg);
		}
		.main2{
			height: 200px;
			width: 200px;
			background-color: rgba(200,0,0,0.5);
			transform: rotatey(139deg);
		}
		.main3{
			height: 200px;
			width: 200px;
			background-color: rgba(200,0,0,0.5);
			transform: rotatez(139deg);
		}
	</style>
</head>
<body>
	<h2> Clock & Anti-Clock Wise Rotation :   transform: rotatez(0deg); </h2>
	<p>The skewX() method skews an element along the X-axis by the given angle.</p>
	<br><br>
	<hr>
	<br><br><br><br><br>
	<!-- <div class="main">x & y axis  movement in Degree</div> -->
	<br><br><br><br><br>
	<hr>
	<br>
	<div class="main1">x axis horizontal movement in degree</div>
	<br><br>
	<hr>
	<br>
	<div class="main2">y axis vertical movement in degree</div>
	<br>
	<br>
	<hr>
	<br>
	<div class="main3">y axis vertical movement in degree</div>

</body>
</html>
