<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .mainSection { height: 600px; width: 600px; background-color:aqua; }
            .section-Row-1 { height: 300px; width: 600px; background-color:rgb(231, 113, 105); }
                .section-Row-1-1 { height: 300px; width: 300px; background-color:rgb(196, 228, 19); position: absolute; left: 8px; top: 8px;}
                .section-Row-1-2 { height: 300px; width: 300px; background-color:rgb(211, 243, 1); position: absolute; left: 308px; top: 8px; }
                    .section-Row-1-2-1 { height: 150px; width: 300px; background-color:rgb(42, 225, 10); position: absolute; left: 0px; top: 0px; }
                    .section-Row-1-2-2 { height: 150px; width: 300px; background-color:rgb(201, 61, 175); position: absolute; left: 0px; top:150px; }
            .section-Row-2 { height: 300px; width: 600px; background-color:rgb(231, 113, 105);  }
                .section-Row-2-1 { height: 300px; width: 300px; background-color:rgb(71, 148, 210); position: relative; left: 0px; top: 0px; }
                    .section-Row-2-1-1 { height: 150px; width: 300px; background-color:rgb(236, 54, 78); position: relative; left: 0px; top: 0px; }
                    .section-Row-2-1-2 { height: 150px; width: 300px; background-color:rgb(244, 129, 167); position: relative; left: 0px; top:0px; }
                .section-Row-2-2 { height: 300px; width: 300px; background-color:rgb(19, 85, 228); position: absolute; left: 308px; top: 308px;}
    </style>    
</head>

<body>
    <section class="mainSection">
        <section class="section-Row-1">
            <section class="section-Row-1-1" ></section>
            <section class="section-Row-1-2" >
                <section class="section-Row-1-2-1 "></section>
                <section class="section-Row-1-2-2"></section>
            </section>
        </section>
        <section class="section-Row-2">
            <section class="section-Row-2-1">
                <section class="section-Row-2-1-1"></section>
                <section class="section-Row-2-1-2"></section>
            </section>
            <section class="section-Row-2-2"></section>
        </section>
    </section>
</body>
</html>
