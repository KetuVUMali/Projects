<!DOCTYPE html>
<html>
<head>
	<title>Hover Effect Tag</title>
	<style type="text/css">
		.ketu{
			width: 400px;
			height: 400px;
			background-color: red;
			text-align: center;
			font-family: arial;
			font-size: 150px;
			color: white;
			padding-top: 100px;
		}
		.ketu:hover{
			background-color: blue;
			height: 500px;
			width: 500px;
			color: black;
		}
	</style>
</head>
<body>

		<div class="ketu">
			ketan
		</div>
</body>
</html>
