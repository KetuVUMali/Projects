<!DOCTYPE html>
<html>
<head>
<style>
h1 {
  font-size: 40px;
}

h2 {
  font-size: 30px;
}

p {
  font-size: 14px;
}
</style>
</head>
<body>

<h1>This is heading 1</h1>
<h2>This is heading 2</h2>
<p>This is a paragraph.</p>
<p>This is another paragraph.</p>
<hr>
<h3>Font Weight </h3>
<p style="font-weight: normal;">This is a paragraph.normal</p>
<p style="font-weight: bold;">This is a paragraph.bold</p>
<p style="font-weight: bolder;">This is a paragraph.bolder</p>
<p style="font-weight:lighter;">This is a paragraph.lighter</p>
<p style="font-weight: 10px;">This is a paragraph.10px</p>
<p style="font-weight: 20px;">This is a paragraph.20px</p>
</body>
</html>
