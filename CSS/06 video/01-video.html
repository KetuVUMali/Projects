<!DOCTYPE html>
<html>
<head>
	<title>Video Tag</title>
	<style type="text/css">
		.style{
			padding-left: 150px;
		}
	</style>
</head>
<body>
	<div>
		<video class="style" width="300px" height="500px" autoplay="" controls="" loop="" >
			<source src="Video.mp4" type="video/mp4">

		<video class="style" width="300px" height="500px" controls="" poster="blue-flowe.jpg">
			<source src="Video.mp4" type="video/mp4">
		</video>
	</div>
</body>
</html>
