<html>   
<head>   
    <title> font-weight property </title>   
    <style>   
      .simple{  
        text-shadow: 2px 2px red;  
        font-size:30px;  
      }  
      .fuzzy{  
        text-shadow: 3px 3px 3px violet;   
        font-size:30px;  
      }  
    </style>   
</head>   
    
<body>   
    <p class="simple">   
      Simple Shadow  
    </p>   
    <br>
    <hr>
    <br>
    <p class="fuzzy">   
    Fuzzy Shadow  
    </p>   
   
</body>   
</html>
