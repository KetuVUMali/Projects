<!DOCTYPE html>
<html>
<head>
<style> 
div {
  width: 100px;
  height: 100px;
  background: red;
  position: relative;
  animation: mymove 3s;
  animation-iteration-count: 2;
}

@keyframes mymove {
  from {top: 0px;}
  to {top: 200px;}
}
</style>
</head>
<body>

<h1>The animation-iteration-count Property</h1>
<h3>Mean Play Number of time animation ( Repeation Anime )</h3>
<p>animation-iteration-count: number;</p>
<p>animation-iteration-count: 2;</p>
<div></div>

</body>
</html>
