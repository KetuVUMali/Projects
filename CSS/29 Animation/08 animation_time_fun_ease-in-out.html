<!DOCTYPE html>
<html>
<head>
<style> 
div {
  width: 100px;
  height: 100px;
  background: red;
  position: relative;
  animation: mymove 5s infinite;
  animation-timing-function: ease-in-out;
}

@keyframes mymove {
  from {left: 0px;}
  to {left: 800px;}
}
</style>
</head>
<body>

<h1>The animation-timing-function Property</h1>
<h2>animation-timing-function: ease-in-out;</h2>
<h3> slow start Slow End </h3>
<h3>Combo = ease-in + ease-out</h3>
<div></div>

</body>
</html>
