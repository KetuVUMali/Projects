<!DOCTYPE html>
<html>
<head>
<style> 
div {
  width: 100px;
  height: 100px;
  background: red;
  position: relative;
  animation: mymove 5s infinite;
  animation-timing-function: ease-in;
}

@keyframes mymove {
  from {left: 0px;}
  to {left: 800px;}
}
</style>
</head>
<body>

<h1>The animation-timing-function Property</h1>
<h2>animation-timing-function: ease-in;</h2>
<h3>Start low After Fast</h3>


<div></div>

</body>
</html>
