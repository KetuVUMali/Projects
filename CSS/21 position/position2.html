<!DOCTYPE html>
<html>
<head>
	<title>Position </title>
	<style type="text/css">
		.b1{
			height: 400px;
			width: 400px;
			font-size: 60px;
			text-align: center;
			background-color: red;
			float: left;
		}
		.b2{
			height: 400px;
			width: 400px;
			font-size: 60px;

			background-color: green;

			top:66px;
			left: 203px
			/*position: relative;
			top:66px;
			left: 203px*/
		}
		.b3{
			height: 400px;
			width: 400px;
			font-size: 60px;
			text-align: center;
			background-color: yellow;
			float: left;
		}
	</style>
</head>
<body>

		<div class="b1">1</div>
		<div class="b2">2</div>
		<div class="b3">3</div>
</body>
</html>
