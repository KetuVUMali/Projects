<p>simple-form works!</p>


<form #userForm="ngForm" (ngSubmit)="userlogin(userForm)">
  <label for="name">Name:</label>
  <input type="text" id="name" name="name"
         [(ngModel)]="user.name">
<br>
  <label for="email">Email:</label>
  <input type="email" id="email" name="email"
         [(ngModel)]="user.email">
<br>
  <label for="password">Password:</label>
  <input type="password" id="password" name="password"
         [(ngModel)]="user.password">
<br>
  <button type="submit" [disabled]="userForm.invalid">Login</button>
</form>

<br><br><br>
<button (click)="userlogin(userForm)" > Out Side Login button</button>
<br><br><br>

<!-- Table to display submitted form data -->
<h3>Submitted Users</h3>
<table *ngIf="submittedUsers.length > 0" border="1">
  <thead>
    <tr>
      <th>Sr. No.</th>
      <th>Name</th>
      <th>Email</th>
      <th>Password</th>
    </tr>
  </thead>
  <tbody>
    <!-- Loop through the submittedUsers array -->
    <tr *ngFor="let user of submittedUsers; let i = index">
      <td>{{ i + 1 }}</td> <!-- Display Sr. No. -->
      <td>{{ user.name }}</td>
      <td>{{ user.email }}</td>
      <td>{{ user.password }}</td>
    </tr>
  </tbody>
</table>
<br><br>
<!-- Message if no data is submitted yet -->
<p *ngIf="submittedUsers.length === 0">No users have been submitted yet.</p>
