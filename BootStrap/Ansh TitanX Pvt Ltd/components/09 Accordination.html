<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GoMechanic Guarantee</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #fff;
            text-align: center;
        }

        .container9 {
            width: 90%;
            max-width: 800px;
            margin: 40px auto;
        }

        .title9 {
            font-size: 24px;
            font-weight: bold;
            position: relative;
            display: inline-block;
            margin-bottom: 20px;
        }

       

        .grid9 {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            justify-content: center;
            margin-top: 20px;
        }

        .box9 {
            padding: 20px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 5px;
            text-align: center;
        }

        /* Background Colors */
        .box9:nth-child(1) { background-color: #dfeaff; } /* Light Blue */
        .box9:nth-child(2) { background-color: #fbe0fe; } /* Light Purple */
        .box9:nth-child(3) { background-color: #e4f9e8; } /* Light Green */
        .box9:nth-child(4) { background-color: #fcf6c7; } /* Light Yellow */

        /* Responsive Design */
        @media (max-width: 768px) {
            .grid9 {
                grid-template-columns: repeat(2, 1fr); /* 2x2 layout for tablets & mobile */
            }
        }

        @media (max-width: 500px) {
            .grid9 {
                grid-template-columns: repeat(2, 1fr); /* Still 2x2 for smaller screens */
            }
        }
    </style>
</head>
<body>

    <div class="container9">
        <h2 class="">GoMechanic Guarantee</h2>
        <div class="grid9">
            <div class="box9">Free Pickup Drop</div>
            <div class="box9">Genuine Parts</div>
            <div class="box9">30 Days Warranty</div>
            <div class="box9">Affordable Prices</div>
        </div>
    </div>

</body>
</html>
