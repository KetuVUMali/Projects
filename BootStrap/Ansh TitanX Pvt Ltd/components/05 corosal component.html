<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Curated Services</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <style>
        .carousel-container {
            padding: 20px;
            border-radius: 10px;
            position: relative;
            overflow: hidden;
        }
        .service-list {
            display: flex;
            overflow-x: auto; /* Allow user scroll */
            scroll-behavior: smooth;
            padding-bottom: 10px;
            white-space: nowrap; /* Prevent wrapping */
        }
        .service-list::-webkit-scrollbar {
            display: none; /* Hide scrollbar */
        }
        .service-item {
            flex: 0 0 auto;
            width: 150px;
            text-align: center;
            padding: 15px;
            border: 2px solid #ddd;
            border-radius: 10px;
            box-shadow: 3px 3px 10px rgba(0, 0, 0, 0.2);
            background-color: white;
            margin-right: 10px;
        }
        .service-item img {
            max-width: 80px;
            margin-bottom: 5px;
        }
        .badge-sale {
            background-color: green;
            color: white;
            padding: 5px;
            border-radius: 5px;
        }
        .carousel-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background-color: red;
            color: white;
            border: none;
            padding: 12px 16px;
            cursor: pointer;
            z-index: 1000;
            font-size: 18px;
            border-radius: 50%;
            transition: background-color 0.3s, transform 0.2s;
        }
        .carousel-btn:hover {
            background-color: darkred;
            transform: scale(1.1);
        }
        .prev {
            left: 10px;
        }
        .next {
            right: 10px;
        }
    </style>
</head>
<body>
    <div class="container mt-4">
        <div class="row">
            <div class="col-md-4">
                <a href="/miles-membership" class="text-decoration-none text-white">
                    <img src="https://gomechprod.blob.core.windows.net/gomech-retail/gomechanic_assets/Website/Warranty/miles.png" class="img-fluid" alt="Miles - Free Road Side Assistance">
                </a>
            </div>
        </div>
        <h3 class="mt-4">Curated Custom Services</h3>
        <div class="carousel-container">
            <button class="carousel-btn prev" onclick="scrollCarousel(-1)">&#10094;</button>
            <div class="service-list" id="carouselScroll">
                <div class="service-item">
                    <img src="https://gomechprod.blob.core.windows.net/gomech-retail/gomechanic_assets/battery_image_for_curated_section_large/liveguard-battery-140.png" alt="Batteries">
                    <div class="badge-sale">SALE</div>
                    <p>Batteries</p>
                </div>
                <div class="service-item">
                    <img src="https://gomechprod.blob.core.windows.net/gomech-retail/gomechanic_assets/car_parts_icons/brakes_2/xxhdpi.png" alt="Brakes">
                    <p>Brakes</p>
                </div>
                <div class="service-item">
                    <img src="https://gomechprod.blob.core.windows.net/gomech-retail/gomechanic_assets/car_parts_icons/ac_parts_2/xxhdpi.png" alt="AC Parts">
                    <p>AC Parts</p>
                </div>
                <div class="service-item">
                    <img src="https://gomechprod.blob.core.windows.net/websiteasset/New%20Website/components/Admin/carouselPlaceholder.png" alt="Clutch">
                    <div class="badge-sale">NEW</div>
                    <p>Clutch</p>
                </div>
                <div class="service-item">
                    <img src="https://gomechprod.blob.core.windows.net/gomech-retail/gomechanic_assets/car_parts_icons/suspension_2/xxhdpi.png" alt="Suspension">
                    <p>Suspension</p>
                </div>
                <div class="service-item">
                    <img src="https://gomechprod.blob.core.windows.net/gomech-retail/gomechanic_assets/car_parts_icons/oil_filters_2/xxhdpi.png" alt="Oil Filters">
                    <p>Oil Filters</p>
                </div>
                <div class="service-item">
                    <img src="https://gomechprod.blob.core.windows.net/gomech-retail/gomechanic_assets/car_parts_icons/spark_plugs_2/xxhdpi.png" alt="Spark Plugs">
                    <p>Spark Plugs</p>
                </div>
            </div>
            <button class="carousel-btn next" onclick="scrollCarousel(1)">&#10095;</button>
        </div>
    </div>

    <script>
        function scrollCarousel(direction) {
            const container = document.getElementById("carouselScroll");
            container.scrollBy({ left: direction * 200, behavior: 'smooth' });
        }
    </script>
</body>
</html>
