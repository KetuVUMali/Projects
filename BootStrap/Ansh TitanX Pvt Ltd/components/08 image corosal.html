<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Workshop Image Slider</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .workshop-slider {
            max-width: 900px;
            margin: auto;
            text-align: center;
        }
        .carousel-inner img {
            border-radius: 8px;
            width: 100%;
            height: 300px;
            object-fit: cover;
        }
    </style>
</head>
<body>
    <div class="container mt-5 workshop-slider">
        <h2>Choose the Workshop Near You</h2>
        <p>Schedule a Pickup Today!</p>
        <div id="workshopCarousel" class="carousel slide" data-bs-ride="carousel">
            <div class="carousel-inner">
                <div class="carousel-item active">
                    <img src="https://gomechprod.blob.core.windows.net/gomech-crap/workshop_docs/staging/131/131_ihero.jpg" class="d-block" alt="Workshop 1">
                </div>
                <div class="carousel-item">
                    <img src="https://gomechprod.blob.core.windows.net/gomech-crap/workshop_docs/staging/71/71_ihero.jpg" class="d-block" alt="Workshop 2">
                </div>
                <div class="carousel-item">
                    <img src="https://gomechprod.blob.core.windows.net/gomech-crap/workshop_docs/Default/Default.jpg" class="d-block" alt="Workshop 3">
                </div>
            </div>
            <button class="carousel-control-prev" type="button" data-bs-target="#workshopCarousel" data-bs-slide="prev">
                <span class="carousel-control-prev-icon" aria-hidden="true"></span>
                <span class="visually-hidden">Previous</span>
            </button>
            <button class="carousel-control-next" type="button" data-bs-target="#workshopCarousel" data-bs-slide="next">
                <span class="carousel-control-next-icon" aria-hidden="true"></span>
                <span class="visually-hidden">Next</span>
            </button>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
