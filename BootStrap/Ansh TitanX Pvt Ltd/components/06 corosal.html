<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Slider Carousel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .carousel-container {
            max-width: 600px;
            margin: auto;
        }
        .carousel-item img {
            width: 100%;
            height: 300px;
            object-fit: cover;
        }
        .carousel-caption {
            background: rgba(0, 0, 0, 0.5); /* Semi-transparent background */
            padding: 10px;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <div class="container mt-5">
        <h2 class="text-center">Get Summer Ready With GoMechanic</h2>
        <div class="carousel-container">
            <div id="carouselExampleIndicators" class="carousel slide" data-bs-ride="carousel" data-bs-interval="2000">
                <div class="carousel-indicators">
                    <button type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide-to="0" class="active" aria-current="true" aria-label="Slide 1"></button>
                    <button type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide-to="1" aria-label="Slide 2"></button>
                    <button type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide-to="2" aria-label="Slide 3"></button>
                    <button type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide-to="3" aria-label="Slide 4"></button>
                </div>
                <div class="carousel-inner">
                    <div class="carousel-item active">
                        <img src="https://orlandocollision.com/Files/EmailCampaigns/AdobeStock_399131963.jpeg" class="d-block w-100" alt="Deep All Round Spa">
                        <div class="carousel-caption d-none d-md-block">
                            <h5>Deep All Round Spa</h5>
                        </div>
                    </div>
                    <div class="carousel-item">
                        <img src="https://sewamitra.up.gov.in/Upload/Service/7b09dd75-5906-43e8-b2e1-298ced236c7c_.jpg" class="d-block w-100" alt="Rubbing & Polishing">
                        <div class="carousel-caption d-none d-md-block">
                            <h5>Rubbing & Polishing</h5>
                        </div>
                    </div>
                    <div class="carousel-item">
                        <img src="https://m.media-amazon.com/images/I/61MIaHtQA1L._AC_UF1000,1000_QL80_.jpg" class="d-block w-100" alt="Front Bumper Paint">
                        <div class="carousel-caption d-none d-md-block">
                            <h5>Front Bumper Paint</h5>
                        </div>
                    </div>
                    <div class="carousel-item">
                        <img src="https://enquiry.dydindia.com/wp-content/uploads/2022/03/muscular-car-service-worker-repairing-vehicle_146671-19605.webp" class="d-block w-100" alt="Periodic Service">
                        <div class="carousel-caption d-none d-md-block">
                            <h5>Periodic Service</h5>
                        </div>
                    </div>
                </div>
                <button class="carousel-control-prev" type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide="prev">
                    <span class="carousel-control-prev-icon" aria-hidden="true"></span>
                    <span class="visually-hidden">Previous</span>
                </button>
                <button class="carousel-control-next" type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide="next">
                    <span class="carousel-control-next-icon" aria-hidden="true"></span>
                    <span class="visually-hidden">Next</span>
                </button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
