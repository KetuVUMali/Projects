<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    
    <style>
        /* Hero Section */
.hero {
    height: 100vh;
    width: 100%;
    background-image: url('../images/home-screen.jpg');
    background-repeat: no-repeat;
    background-size: cover;
    background-position: center;
    display: flex;
    flex-direction: row;
    padding-top: 70px;
}

.left {
    flex: 1;
}

.right {
    flex: 1;
    display: flex;
    flex-wrap: nowrap;
    flex-direction: row;
    align-content: stretch;
    justify-content: space-around;
    align-items: flex-end;
}
@media screen and (min-width: 1025px) {
    .form-container {
        background: white;
        padding: 2rem;
        border-radius: 8px;
        box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        position: fixed;
        right: 20px;
        bottom: 45px;
        width: 100%;
        max-width: 400px;
        box-shadow: 0 5px 5px -3px rgb(0 0 0 / 16%), 0 8px 10px 1px rgb(0 0 0 / 11%), 0 3px 14px 2px rgb(0 0 0 / 10%);
    }

}

/* Form Container */

/* Trust Indicator */
.trust-indicator {
    display: flex;
    align-items: center;
    gap: 1rem;
    margin-top: 1rem;
}

.rating {
    color: #28a745;
    font-weight: 600;
}

.form-select, .form-control {
    margin-bottom: 1rem;
}


/* tablet view */
@media screen and (min-width: 601px) and (max-width: 1024px) {
    .hero {
        height: 59vh;
        width: 100%;
        background-image: url(../images/home-screen.jpg);
        background-repeat: no-repeat;
        background-size: cover;
        background-position: center;
        display: flex;
        flex-direction: row;
        padding-top: 70px;
    }
    /* .form-container {
        background: white;
        padding: 1rem;
        border-radius: 8px;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        position: fixed;
        right: 20px;
        top: 90px;
        width: 80%;
        max-width: 294px;
        box-shadow: 0 5px 5px -3px rgb(0 0 0 / 16%), 0 8px 10px 1px rgb(0 0 0 / 11%), 0 3px 14px 2px rgb(0 0 0 / 10%);
    } */
    .form-container {
        background: white;
        padding: 3vw;
        border-radius: 8px;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        position: fixed;
        right: 5vw;
        top: 90px;
        /* height: 34vh; */
        width: 100vw;
        max-width: 42vw;
        box-shadow: 0 5px 5px -3px rgb(0 0 0 / 16%), 0 8px 10px 1px rgb(0 0 0 / 11%), 0 3px 14px 2px rgb(0 0 0 / 10%);
    }

}



/* Responsive Design */
@media (max-width: 600px) {
    
    .hero {
        flex-direction: column;
        align-items: center;
        /* justify-content: center; */
        text-align: center;
        display: flex;
        flex-direction: column;
        background-image: none;
        padding-top: 0px;
        height: 0vh;
    }
    .form-container {
        padding: 1rem;
        border-radius: 14px;
        width: 90%;
        position: relative;
        margin-bottom: 20px;
        box-shadow: 0 5px 5px -3px rgb(0 0 0 / 16%), 0 8px 10px 1px rgb(0 0 0 / 11%), 0 3px 14px 2px rgb(0 0 0 / 10%);
    }

    .left {
        display: none;
        background-attachment: none;
    }

    .right {
        width: 100%;
    }
}






/* Center container */
.center {
    display: none;
    text-align: center;
    padding: 20px;
    background-color: #f4f4f4;
}

/* Image Scroll Container */
.scroll-container {
    display: flex;
    overflow-x: auto;
    scroll-snap-type: x mandatory;
    gap: 10px;
    padding: 15px;
    /* background-color: #222; */
    border-radius: 10px;
    box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.2);
    width: 100%;
    max-width: 400px;
    margin: auto;
    white-space: nowrap;
}

/* Individual images */
.scroll-container img {
    width: 100%;
    max-width: 400px;
    height: auto;
    border-radius: 10px;
    box-shadow: 0px 2px 10px rgba(255, 255, 255, 0.2);
    transition: transform 0.3s ease-in-out;
    scroll-snap-align: center;
}

/* Add hover effect */
.scroll-container img:hover {
    transform: scale(1.05);
}

/* Show only on mobile screens */
@media (max-width: 600px) {
    .center {
        display: block; /* Show on mobile */
    }

    .scroll-container {
        gap: 5px;
        padding: 10px;
        overflow-x: scroll;
        scrollbar-width: none; /* Hide scrollbar for smooth UX */
    }

    .scroll-container::-webkit-scrollbar {
        display: none; /* Hide scrollbar in WebKit browsers */
    }
}

    </style>
</head>
<body>
    <div class="hero">
        <div class="left"></div>

        <!-- Center Image Scroll (Hidden on Desktop, Visible on Mobile) -->
        <div class="center">
            <div class="scroll-container">
                <img src="../images/head1.jpeg" alt="Cinque Terre">
                <img src="../images/head2.jpeg" alt="Forest">
                <img src="../images/head3.jpeg" alt="Northern Lights">
                <img src="../images/head4.jpeg" alt="Mountains">
                <img src="../images/head1.jpeg" alt="Cinque Terre">
                <img src="../images/head2.jpeg" alt="Forest">
            </div>
        </div>

        <div class="right">
            <div class="form-container">
                <h1 class="mb-4 fs-2">Experience The Best Car Services In Pune</h1>
                <p class="lead mb-4">Get instant quotes for your car service</p>

                <select class="form-select">
                    <option selected>PUNE</option>
                    <option>Mumbai</option>
                    <option>Delhi</option>
                    <option>Bangalore</option>
                </select>

                <select class="form-select">
                    <option selected>SELECT YOUR CAR</option>
                    <option>Maruti Suzuki</option>
                    <option>Hyundai</option>
                    <option>Honda</option>
                    <option>Toyota</option>
                </select>

                <input type="tel" class="form-control" placeholder="ENTER MOBILE NUMBER"/>

                <button class="btn btn-danger w-100">CHECK PRICES FOR FREE</button>

                <div class="trust-indicator">
                    <div>
                        <span class="rating"> <i class="ri-star-fill"></i> 4.0 </span>
                        <small class="text-muted d-block">Based on 150000+ Reviews</small>
                    </div>
                    <div class="vr"></div>
                    <div>
                        <strong>2 Million+</strong>
                        <small class="text-muted d-block">Happy Customers</small>
                    </div>
                </div>
            </div>
        </div>
  </div>

  

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
