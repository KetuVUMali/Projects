<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Download GoMechanic App</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .app-container14 {
            max-width: 1200px;
            margin: auto;
            padding: 20px;
        }
        .download-section14 {
            text-align: center;
            padding: 50px 20px;
            border: 1px solid #ddd;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        .app-image14 {
            max-width: 100%;
            height: auto;
        }
        .store-buttons14 img {
            max-width: 150px;
            margin: 10px;
        }
        .app-link-input14 {
            display: flex;
            align-items: center;
            justify-content: center;
            margin-top: 20px;
        }
        .app-link-input14 input {
            width: 200px;
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 5px;
            margin-right: 10px;
        }
        .app-link-input14 button {
            background-color: #dc3545;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
        }
        .app-link-input14 button:hover {
            background-color: #b02a37;
        }
    </style>
</head>
<body>
    <div class="container app-container14">
        <div class="download-section14">
            <h2 class="fw-bold">Download GoMechanic App</h2>
            <div class="row mt-4">
                <div class="col-md-6 text-center">
                    <img src="https://www.bigabid.com/wp-content/uploads/2023/06/Key-Apple-App-Store-vs-Google-Play-Store-Differences-for-Developers-and-MarketersAsset-8-1536x864.png" alt="GoMechanic App Screenshot" class="app-image14">
                </div>
                <div class="col-md-6 text-center">
                    <div class="store-buttons14">
                        <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/7/78/Google_Play_Store_badge_EN.svg/800px-Google_Play_Store_badge_EN.svg.png" alt="Google Play Store">
                        <img src="https://e7.pngegg.com/pngimages/663/177/png-clipart-app-store-ios-apple-apple-text-logo.png" alt="Apple App Store">
                    </div>
                    <div class="app-link-input14">
                        <input type="text" placeholder="Mobile Number">
                        <button>GET APP LINK</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
