<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bootstrap Margin Example</title>

  <!-- Bootstrap CSS -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
    rel="stylesheet"
  >
</head>

<body class="p-4">

  <h2 class="mb-4">Bootstrap Margin Classes Example</h2>

  <!-- m-5 (All sides) -->
  <div class="bg-primary text-white p-3 m-5">m-5 (Margin on all sides)</div>

  <!-- mt-4 (top) -->
  <div class="bg-success text-white p-3 mt-4">mt-4 (Margin top)</div>

  <!-- mb-3 (bottom) -->
  <div class="bg-danger text-white p-3 mb-3">mb-3 (Margin bottom)</div>

  <!-- ms-5 (left in LTR) -->
  <div class="bg-warning p-3 ms-5">ms-5 (Margin start / left)</div>

  <!-- me-4 (right in LTR) -->
  <div class="bg-info text-white p-3 me-4">me-4 (Margin end / right)</div>

  <!-- mx-3 (left + right) -->
  <div class="bg-secondary text-white p-3 mx-3">mx-3 (Margin X-axis)</div>

  <!-- my-4 (top + bottom) -->
  <div class="bg-dark text-white p-3 my-4">my-4 (Margin Y-axis)</div>

  <!-- m-auto (horizontal center) -->
  <div class="bg-light border text-center p-3 m-auto" style="width: 200px;">
    m-auto (Center Box)
  </div>

</body>
</html>
