<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Bootstrap Responsive Position – Deep Example</title>

<!-- Bootstrap CSS -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<h4 class="text-center my-4">
Responsive Position (Mobile • Tablet • Desktop)
</h4>

<!-- ================================
     PARENT CONTAINER
     ================================ -->
<!-- 
min-vh-100 → full screen height
position-relative → required for absolute child
-->
<div class="container-fluid min-vh-100 position-relative border">

  <!-- ================================
       IMAGE ELEMENT
       ================================ -->
  <img
    src="https://picsum.photos/140"
    alt="Responsive Positioned Image"

    class="
      position-absolute

      /* =====================
         MOBILE (default)
         ===================== */
      top-0 start-0

      /* =====================
         TABLET (md)
         ===================== */
      top-md-50 start-md-50
      translate-middle-md

      /* =====================
         DESKTOP (lg)
         ===================== */
      bottom-lg-0 end-lg-0
    "
  >

</div>

</body>
</html>
