<!DOCTYPE html>
<html>
<head>
  <title>Rounded Image</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="p-4">

  <h2>Rounded Image</h2>
  <pre>
    📌 Concept
            Adds smooth corners
            Used in cards, UI images
            The .img-rounded class adds rounded corners to an image
  </pre>

  <img src="https://4kwallpapers.com/images/walls/thumbs_2t/24474.jpg"
       class="img-fluid rounded"
       alt="Rounded Image">
<br> <br> <br>

    <div class="border border-3 border-dark col-md-6">
       <img src="https://4kwallpapers.com/images/walls/thumbs_2t/24474.jpg"
       class="img-fluid rounded rounded-4 "
       alt="Rounded Image">
    </div>

    <br><br>
    <div class="row text-center">
  <div class="col-md-2">
    <p>Top</p>
    <img src="https://4kwallpapers.com/images/walls/thumbs_2t/24474.jpg"
         class="img-fluid rounded-top">
  </div>

  <div class="col-md-2">
    <p>Bottom</p>
    <img src="https://4kwallpapers.com/images/walls/thumbs_2t/24474.jpg"
         class="img-fluid rounded-bottom">
  </div>

  <div class="col-md-2">
    <p>Start (Left)</p>
    <img src="https://4kwallpapers.com/images/walls/thumbs_2t/24474.jpg"
         class="img-fluid rounded-start">
  </div>

  <div class="col-md-2">
    <p>End (Right)</p>
    <img src="https://4kwallpapers.com/images/walls/thumbs_2t/24474.jpg"
         class="img-fluid rounded-end">
  </div>
</div>


</body>
</html>
