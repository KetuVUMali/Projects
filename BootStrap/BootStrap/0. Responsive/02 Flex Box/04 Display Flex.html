<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        html,body{
            height: 100%;
            width: 100%;
        }

        

/* Flex Use */
        .parent2{
            height: 500px;
            width: 500px;
            background-color: lightblue;
            display: flex;                  /* Flex Use */
            align-items: center;            /* Y-Axis alienment (Cross axix) */
            justify-content: center;        /* X-Axis alienment (mean axis) */
            flex-direction: column;
        }

        .child3{
            height: 200px;
            width: 200px;
            background-color: crimson;
            border: 2px solid black;
        }
        .child4{
            height: 200px;
            width: 200px;
            background-color: rgb(82, 70, 220);
            border: 2px solid black;
        }
    </style>
</head>
<body>
    <h1>Display:Flex; => Convert ele into Row and Colum Formate.  </h1>
    <h2>Flex-Direction Colum; => Flex item row convert into Colum </h2>
    

    <br> <br> <br> <br> <hr><br> <br><br>

    <div class="parent2">
        <div class="child3"></div>
        <div class="child4"></div>
        <div class="child5"></div>
    </div>
    
    <br> <br> <br> <br> <hr><br> <br><br>

    <style>
         .parent3{
            height: 500px;
            width: 500px;
            background-color: lightblue;
            display: flex;                  /* Flex Use */
            align-items: center;            /* Y-Axis alienment  */
            justify-content: space-evenly;        /* X-Axis alienment take same space to every ele */
            flex-direction: column;
        }

        .child5{
            height: 200px;
            width: 200px;
            background-color: crimson;
            border: 2px solid black;
        }
        .child6{
            height: 200px;
            width: 200px;
            background-color: rgb(82, 70, 220);
            border: 2px solid black;
        }
        .child7{
            height: 200px;
            width: 200px;
            background-color: rgb(26, 177, 69);
            border: 2px solid black;
        }
    </style>

    <div class="parent3">
        <div class="child5"></div>
        <div class="child6"></div>
        <div class="child7"></div>
        <div class="child5"></div>
    </div>
</body>
</html>
