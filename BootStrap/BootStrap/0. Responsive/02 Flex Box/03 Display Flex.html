<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        html,body{
            height: 100%;
            width: 100%;
        }

        
/* Flex Use */
        .parent2{
            height: 500px;
            width: 100%;
            background-color: lightblue;
            display: flex;                  /* Flex Use */
            align-items: center;            /* Y-Axis alienment (Cross axix) */
            justify-content: space-evenly;        /* X-Axis alienment equal space */
        }

        .child3{
            height: 200px;
            width: 200px;
            background-color: crimson;
            border: 2px solid black;
        }
        .child4{
            height: 200px;
            width: 200px;
            background-color: rgb(82, 70, 220);
            border: 2px solid black;
        }
    </style>
</head>
<body>
    <h1>Display:Flex; => Use More to make responsive design.  </h1>
    <h2>Take automatic size(Shrink)/flexical Box</h2>
    <h4>Shrink => Chipakne 🙏</h4>
    <div class="parent2">
        <div class="child3"></div>
        <div class="child4"></div>
    </div>
