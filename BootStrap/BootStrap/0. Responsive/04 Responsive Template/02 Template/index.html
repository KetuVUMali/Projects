<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .contener{
            background-color: beige;
            border: 5px solid black;
            margin: 2px;
            padding: 2px;
            display: flex;
        }

        .box{
            height: 200px;
            width: 200px;
            border: 2px solid red;
            margin: 2px;
            padding: 2px;
        }
        #box1{ background-color:rgb(89, 236, 187);}
        #box2{ background-color:rgb(27, 184, 40);}
        #box3{ background-color:rgb(63, 51, 168);}
        #box4{ background-color:rgb(203, 188, 74);}

        /* 640+ Screen Size  */
        @media (min-width:640px) {
            .contener{
                flex-direction: row;
            }
        }

        /* 0 to 640 Screen Size */
        @media (max-width:640px) {
            .contener{
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="contener">
        <div class="box" id="box1">1</div>
        <div class="box" id="box2">2</div>
        <div class="box" id="box3">3</div>
        <div class="box" id="box4">4</div>
    </div>
</body>
</html>
