<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Range Between</title>
    <style>
        .box{
            height: 400px;
            width: 400px;
            background-color: aqua;
            border: 3px solid burlywood;
        }

        @media (min-width:300px) and (max-width:500px) {
            .box{
                background-color: black;
            }
        }
    </style>
</head>
<body>
    <div class="box">
        <h3>(min-width:300px) and (max-width:500px)</h3>
        <h4> 300px To 500px : between </h4>
        <h4>Apply Black Color</h4>
    </div>
</body>
</html>
