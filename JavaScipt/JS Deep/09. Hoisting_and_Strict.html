<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title> Hosting and Strict Mode</title>
</head>
<body>

	<script type="text/javascript">
		// function and variable declarations are moved (hoisted) to the top of their scope before the code is executed.
		// Hoisting Example 1 - variable Declaration 

           /*
               // without hosting, show error
				console.log(a);
		   */

			// with hosting show undefine var
				console.log("Befor Hosting _ var X :",x);  //undefine x value

				var x=10;   // define x value
				console.log("After Hoisting - Var X :",x); // x valuex is 10


		// Hoisting Example 2 - Fun Declaration

			
               // without hosting, show error
				 greet();
		   

			// with hosting show undefine var
				 greet(); 

				 function greet()
				    {
				    	console.log("Hello, I am Hoisted!");
				    }


			// Hoisting with Functions

				sayHello(); // ✅ Output: Hello, world!

				function sayHello() {
					console.log("Hello, world!");
				}



				// Why Use Hoisting?
				// 	✅ Allows functions to be used before their definitions.
				// 	✅ Helps organize code in a logical way.
				// 	✅ Makes JavaScript flexible but can lead to unexpected behavior.



			// "use strict" is a special mode in JavaScript that prevents common mistakes and makes debugging easier.
				// Activated by writing "use strict"; at the beginning of a script or function.
				// Helps catch errors early that JavaScript usually ignores.


				// Why Use Strict Mode?
					// 	✅ Helps prevent bugs in large applications.
					// 	✅ Disallows bad coding practices (e.g., using undeclared variables).
					// 	✅ Improves security by preventing dangerous JavaScript behaviors.


					// Without strict mode:
						// name = "Alice"; // No error, but it's a global variable (bad practice)
						// console.log(name);

					// With strict mode:
						// "use strict";
						// name = "Alice"; // ❌ ReferenceError: name is not defined
						

					// Without strict mode:
						// var message = "Hello";
						// delete message; // ✅ No error (but doesn't delete it)
						// console.log(message);

					// With strict mode:
						// "use strict";
						// var message = "Hello";
						// delete message; // ❌ SyntaxError: Delete of an unqualified identifier in strict mode


					// ✔ Use Hoisting wisely, but avoid var to prevent undefined values.
					// ✔ Use Strict Mode to write cleaner, safer JavaScript.
					// ✔ Always declare variables properly (let, const) to avoid hoisting issues.
	</script>

</body>
</html>
