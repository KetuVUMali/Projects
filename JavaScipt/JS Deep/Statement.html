<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title> JS Statement Example</title>
</head>
<body>

	<h1>JS Statement Example</h1>
	<div id="output"></div>

	<script>
		//decleare statement
			let age;

		//assignment statement
			age=25;
			
		//declear & assignment
			let abc=30;

		//output (id="output") statement 

			alert("ABC :",abc)
			console.log("Age:",age);
			document.getElementById("output").innerHTML="this is output "; //outside or on web page o/p show

		//comparision statement
		//conditional statement
			if (age >= 18)
				 {
				 	console.log("Your are Adult");
				 } 
			else
				{
					console.log("Your are minor");
				}

		//comment -Single Line
				//

		//Multi line comment
				/*...........
				..............
				...............*/
		console.log(" ");
		console.log(" ");

		console.log('This is after comment');



	</script>
