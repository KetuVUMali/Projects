			// replaceAll()
				var a = " English Is Global Lang, But I Am Speak english";
				console.log(a);												// English Is Global Lang, But I Am Speak english
				var b = a.replaceAll("English","Marathi");
				console.log(b);												// Marathi Is Global Lang, But I Am Speak english												
				var c = a.replaceAll(/English/gi,"Marathi");

		      let split1 = string.split(","); //input is comma (we use in opc to seperate it but its present in string)
		      console.log(split1);				// ['Javascript', 'Is', 'Brain', 'Lang']
			  console.log(split1.length);		// 4

		        console.log("ketu ".repeat(3));			// ketu ketu ketu 

		     // 16. starstWith()
		        // check string start with give value or not
		        // output true or False
		        var string = "Hello, Saurabh";
		        let start1 = string.startsWith("Hello");
		        console.log(start1);						// true
		        let start2 = string.startsWith("hello");    //case sensitive
		        console.log(start2); 						// false


		    // 17. endsWith() 
		      // check string end with give value or not
		        // output true or False
		        var string = "Hello, Jaimin";
		        let end1 = string.endsWith("Jaimin");
		        console.log(end1);						// true
		        let end2 = string.endsWith("jaimin"); //case sensitive
		        console.log(end2); 						// false


		      // 18. padStart()
		      	// to genrate serial no.
		      	var start = "1"; //starting sries no.
		      	let padStart = start.padStart(5,"0");
		      	console.log(padStart);						// 00001
		      	console.log("1".padStart(5,"*"));			// ****1

		       // to genrate serial no.
		      	var end = "1"; //starting sries no.

		      	console.log(padEnd);						// 10000

		        var string = "The Cat In The Hat";
		        let match = string.match(/at/g);
		        console.log(match);						// ['at', 'at']
		        console.log("ketan Mali".match(/a/g));	// ['a', 'a']
		        // g use for all string char match
		        console.log("ketan Mali".match(/a/));	// ['a', index: 3, input: 'ketan Mali', groups: undefined]
		        // no g use only first match show

		    	var string = "The Cat In The Hat";
		        let search1 = string.search(/at/g);

		        // iii.

				console.log("My Name IS demo1 demo2");				// My Name IS demo1 demo2
