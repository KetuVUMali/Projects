<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>JavaScript Examples</title>
</head>
<body>

	<script>
			alert("Hellow, I am Internal Script!");

		Console.log("User Input:",userInput); 
	</script>

		<!-- External JS File -->

		<script src="exjs.js"></script>

					    <!-- Aditional HTML Content   -->

					 <script>

							document.getElementById('output1').innerHTML="This is added through JS";  

					  </script>
