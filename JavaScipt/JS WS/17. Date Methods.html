	<h4>Date Methods </h4>

	<h1 id="res">

	<button onclick="getDate()"> Full Date </button>

	<script type="text/javascript">
		var date = new Date();

		function getDate()
			{
				document.getElementById('res').innerText = date;
			}

		function year()
			{
				document.getElementById('res').innerText = date.getFullYear();
			}

		function month()
			{
				// document.getElementById('res').innerText = date.getMonth();

				// (" .getMonth() is give no. but now we add some programmin then hi give month name");

				var month = ["Jan", "Feb", "Mar", "April", "May", "June", "Jully", "Aug","Sep", "Oct", "Nov", "Dec"];
				document.getElementById('res').innerText = month[date.getMonth()];

			}

		function hour()
			{
				document.getElementById('res').innerText = date.getHours();
			}

		function todate()
			{
				document.getElementById('res').innerText = date.getDate();
			}

		function day()
			{
				document.getElementById('res').innerText = date.getDay();
			}


		function min()
			{
				document.getElementById('res').innerText = date.getMinutes();
			}


		function time()
			{
				document.getElementById('res').innerText = date.getTime();
			}


		function sec()
			{
				document.getElementById('res').innerText = date.getSeconds();
			}


		function millisec()
			{
				document.getElementById('res').innerText = date.getMilliseconds();
			}


	</script>

</body>
	<script type="text/javascript">

		    // Show today day
		    // o/p give in index 
		    // get weekday as a number (0 - 6)
		    // 0 - sunday     1 - monday  .......
		      var today = new Date();
		      console.log(today.getDay()); 

		// 4. .getFullYear()
			// give current year
			// get the year as four digit number (yyyy)
		      var today = new Date();
		      console.log(today.getFullYear());

		    // Give Current Hour

		      var today = new Date();

		      var today = new Date();

		    // Give current getSeconds
