<!DOCTYPE html>
<html>
<head>
	<title> Conditional Statement </title>
</head>
<body>
	<h3> Conditional Statement </h3>
	<pre>
		- Con. stat. (Control Ststement) used to change the flow of the program's execution.

		- Two possible cases, either true or false. 


		Type of Conditional Statement:
		1. If 
		2. If Else
		3. If Else If
		4. Nested If Else
	</pre>

</body>

	<script type="text/javascript">
		
		// If Statement
			var age=18;
				if(age>=30)						// false
				{
					console.log("Yes You Can Vote");
					//alert(" Yes You Can Vote ");
					//document.write("<h3>Yes You Can Vote</h3>");
				}

		// If - Else Statement
			var age=18;
				if(age>=12)
				  {
				  	console.log("Yes You Can Vote!");
				  }
				else
				  {
				  	console.log("Yes You Can't Vote");
				  }

		//If - ElseIf -Else Statement
			// Logical OP
			let marks=75;
				if(marks>=90)
				  {
				  	console.log("Excellent!");
				  }
				else if(marks>=60)				//*
				  {
				  	console.log("Nice!");
				  }
				else if(marks>=70)
				  {
				  	console.log("Good Job!");
				  }
				else if(marks>=50)
				  {
				  	console.log("You Passed");
				  }
				else
				  {
				  	console.log("You Need To Improvmrnt");
				  }


		
	</script>

</html>
