<!DOCTYPE html>
<html>
<head>
	<title> Changing CSS </title>
</head>
<body>
	<h1> DOM </h1>
	<h4> Selection Of Element </h4>
	
	<h4>4. Changing CSS  </h4>
	<p> Change/Update HTML CSS or Style (Pass CSS) </p>

	<b> Hello Ketu </b>
	<script type="text/javascript">
		 var a = document.querySelector("b");         // Bold Tag Select 
		  a.style.color = "red";       			     // Change Text Color
		  a.style.backgroundColor = "yellow";		// bg Color Yellow

	</script>
</body>
</html>
