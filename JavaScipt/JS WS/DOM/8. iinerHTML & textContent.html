<!DOCTYPE html>
<html>
<head>
    <title>Basic</title>
    <style type="text/css">
        h1 {
            font-size: 70px;
        }
        
        #box {
            height: 300px;
            width: 300px;
            background-color: salmon;
        }

        div {
            color: royalblue;
        }

    </style>
</head>
<body>
    <h1>DOM</h1>
    <h4>Document Object Model</h4>

    <div id="box">Hello</div>

    <script type="text/javascript">
        var box = document.querySelector("#box");

        // Correct usage to insert HTML content
        box.innerHTML = "<h1>Ketan</h1>";

        // Uncomment to set plain text content
        // box.textContent = "Ketan";
    </script>
</body>
</html>
