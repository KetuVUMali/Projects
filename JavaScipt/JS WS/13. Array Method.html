<!DOCTYPE html>
<html>
<head>
	<title> Array Methods </title>

	<h1 id="res"> </h1>
	<button onclick="pop()"> POP </button>
	<button onclick="push()"> PUSH </button>
	<button onclick="slice()"> Slice </button>
	<button onclick="reverse()"> Reverse </button>
	<button onclick="shift()"> Shift </button>
</head>
<body>

	<h3> Array Methods </h3>
	<pre>
		
	</pre>





		<script type="text/javascript">
				var fruits = ["mango", "Apple", "Pineapple", "Banana"];
				var demo = fruits;
				document.getElementById('res').innerText = demo;
				function pop()
					{
						demo.pop();												// delete last
						document.getElementById('res').innerText = demo;
					}
				function push()
					{
						var x = prompt("Please Enter a fruit Name "," ");
						demo.push(x);											// Add last
						document.getElementById('res').innerText = demo;
					}
				function slice()
					{
						var x = prompt(" Write Index No. "," ");
						
						document.getElementById('res').innerText = demo.slice(x);
					}
				function reverse()
					{
						demo.reverse();											// Reverse array ele
						document.getElementById('res').innerText = demo;
					}
				function shift()
					{
						var x = demo.shift();									// Remove First ELE
						document.getElementById('res').innerText = x;
					}

		</script>

</body>

		<script type="text/javascript">

				// to get subarray
					console.log("13. .slice() Print ele");
					var arr1 = ["A","B","C","D","E"];
