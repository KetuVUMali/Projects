<!DOCTYPE html>
<html>
<head>
	<title>33. Js Print Star Patterns Using user Defined Fun</title>
</head>
<body>

<script type="text/javascript">
	function printPattern(limit) {
		for (var i = 1; i <= limit; i++) 
		{
			for (var j = 1; j <= i; j++) 
			{
				document.write(" *");
			}
			document.write("<br>");
		}

		for (var i = limit - 1; i >= 1; i--) 
		{
			for (var j = 1; j <= i; j++) 
			{
				document.write(" *");
			}
			document.write("<br>");
		}
	}

	// Call the function with a specific limit
	printPattern(7);
</script>

</body>
</html>
