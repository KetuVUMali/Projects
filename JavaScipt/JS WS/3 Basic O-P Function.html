<!DOCTYPE html>
<html>
	<head>
		<title> Basic O/P Function </title>
	</head>
	<body>
		<h1> Basic O/P Function </h1>
	</body>

	<script type="text/javascript">

		// 1. alert 
		    //(on web page top section show box)
			alert("This Is Alert Box");


		// 2. console.log()  
		     //( at console section show )
		     // we use console section only testing perpose (debuging purpose)
			console.log("This Is Console Area");
			console.log("Hellow Ketu")

		// 3. document.write()
			 //write on html document
			 // O/P show on HTML page Top-Left direct
			 document.write(" This Is Document Section ");

			 // we can write with tag also
			 document.write("<h1> <i>Document Section using h1 Tag </i> </h1>");


		// 4. prompt()
			     // to give a box to user,it contain message and text box 
			     // its use for perfoming a particular task
			     // syntax : prompt("use show message","text area box")
			     prompt("This Is Prompt Box1","");


			     // syntax : prompt("use show message","text area (placeholder message)")
			     //  prompt("This Is Prompt Box2","Write Your Name");
				  var a =  prompt("This Is Prompt Box2","Write Your Name");
				  console.log("Second Prompt : ",a)



		// 5. confirm()
			   // to confartion from user
			   // ex. for.  login, pass save, confirm or cancel, leave this page, etc.....

			   confirm("This Is Confirmation Box For User");

			   confirm("Do Tou Wont To Login! (Confirmation Box 2)");

		
	</script>
</html>
