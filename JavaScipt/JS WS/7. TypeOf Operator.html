<!DOCTYPE html>
<html>
<head>
	<title> TypeOf Operators </title>
</head>
<body>
	<h1> Type Of Operators </h1>
	<pre>
		-to check data type 
	</pre>

	<script type="text/javascript">
		
		// 1.  typeof
				var a = 1;
				var b = 1.2;
				var c = "A";
				var d = 'A';
				var e = true;
				var f = null;
				var g = [1,2,3,4,"A"];
				var h = { "1" : "Hellow",};
				var i = new Date();


				document.write(a + " ===> " +typeof a +"<br>");		// number
				document.write(b + " ===> " +typeof b+"<br>");		// number
				document.write(c + " ===> " +typeof c+"<br>");		// string
				document.write(d + " ===> " +typeof d+"<br>");		// string
				document.write(e + " ===> " +typeof e+"<br>");		// boolean
				document.write(f + " ===> " +typeof f+"<br>");		// object (null)
				document.write(g + " ===> " +typeof g+"<br>");		// object (array)
				document.write(h + " ===> " +typeof h+"<br>");		// object (object)
				document.write(i + " ===> " +typeof i+"<br>"); 		// object (date)

	</script>

</body>
</html>
