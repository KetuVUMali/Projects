<!DOCTYPE html>
<html>
<head>
	<title> 32. Print Table In JS </title>
	<style type="text/css">
		div
			{
				border-bottom:1px black solid;
				width:120px;
				font-family: verdana;
			}
	</style>
</head>
<body>

</body>
	<script type="text/javascript">
		 
		 var num = prompt("Please Enter A Number", " ");
		 
		 for(var i=1; i<=10; i++)
			 {
			 	document.write("<div>");  // Create Div 
			 	document.write(num + " x " + i + " = " + i*num);  // 2 x 1 = 2

			 	document.write("</div>");  // Close Div
			 }
	</script>
</html>
