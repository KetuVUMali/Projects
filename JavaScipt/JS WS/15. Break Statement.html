<!DOCTYPE html>
<html>
<head>
	<title>  Break Statement</title>
</head>
<body>
	<h4>  Break Statement </h4>
	<pre>
		
		-The break Statement is used to break the execution of current loop or switch case

		- break current execution the loop & come out of loop
		
		- break loop that point 

		- It is a keyword. 

	</pre>

		<br><br>


		<script type="text/javascript">
		// Break Statement (break loop6543543 
		       for (let i=1; i<=5; i++)
		          {
		          	if(i==3)
		          	  {
		          	  	document.write("Break Statement - Loop is terminated at iteration 3")
		          	  	break;
		          	  }
		          	document.write("Break Statement - Iteration :",i+ "<br>");
		          }  
		</script>



		<br><br>

		<script type="text/javascript">
				for (var i = 0;i<=10;i++)
						{
							if (i==5)
								{
									break;
								}
							document.write(i+ "<br>");
						}
		</script>
			<br><br>

		
</body>
</html>
