		    Name : <i id="result"> </i>
			<br>
			<button onclick="call()"> Call </button> 

			<pre>
				when we click on call Button that time prompt is open
			</pre>


			<script type="text/javascript">
				function call()
				 {
					var name  =  prompt("Enter Your Name!","");                  //

					document.getElementById('result').textContent = name;            //
