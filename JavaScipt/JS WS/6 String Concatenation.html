<!DOCTYPE html>
<html>
<head>
	<title> String Concatenation </title>
</head>
<body>
	<h1> String Concatenation  </h1>

</body>
	<script type="text/javascript">
		// 1. String Concatenation
			console.log("1. String Concatenation");

			var fName = 'ketu';
			var lName = "Mali";
			var fullName = fName+lName;
			console.log("FullName : ",fullName);		// FullName : ketuMali

			var firstName = 'ketu';
			var lastName = " Mali";
			var fullName = firstName+lastName;
			console.log("FullName : ",fullName);		// FullName : ketu Mali

			var firstName = 'ketu';
			var lastName = "Mali";
			var fullName = firstName+ " " +lastName;
			console.log("FullName : ",fullName);		// FullName : ketu Mali

			var firstName = 'ketu';
			var fullName = firstName + " mali";
			console.log("FullName : ",fullName);		// ketu mali

			var fullName = "ketu" + " mali";
			console.log("FullName : ",fullName);		// ketu mali

			var z = "3" + "3";
			console.log(z);								// 33

			


	</script>
</html>
