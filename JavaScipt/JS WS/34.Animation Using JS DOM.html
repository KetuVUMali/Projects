<!DOCTYPE html>
<html>
<head>
	<title> 32.Animation Using JS DOM </title>
</head>
<style type="text/css">
	
	.yellow
		{
			width: 400px;
			height: 400px;
			background-color: yellow; 
			position: relative;
			margin-top: 5px;

		}

	#red
		{
			width: 50px;
			height: 50px;
			background:red;
			position: absolute;
			top: 00px;
			left: 00px; 
		}
</style>
<body>

	<button onclick="move()"> Click </button>
	<div class="yellow"> 
		<div id="red">
			
		</div>
	</div>


</body>
	<script type="text/javascript">
		function move()
			{
				var redEle = document.getElementById('red');
				var poe = 0;
				var anim = setInterval(animate,5);  // repeat task

				function animate()
					{
						if(poe == 350)
							{
								clearInterval(anim);    // stop animatin
							}
						else
							{
								poe++; 
								redEle.style.top = poe+"px";
								redEle.style.left = poe+"px";
							}

						
					}
			}
	</script>
</html>
