<!DOCTYPE html>
<html>
<head>
	<title> Switch Case </title>
</head>
<body>

	<h1> Switch Case </h1>

	<pre>
		
		- Switch statement is used to choose in between many cases

		- Switch case is alternative of If-ElseIf-Else 
	</pre>

</body>
	
	<script type="text/javascript">
		//Switch Case
			let dayofweek=3;
			let dayname;
				switch(dayofweek)
				  {
				    case 1:
				  		   dayname = "Monday";
				  		   break;
				  	case 2:
				  		   dayname = "Tuesday";
				  		   break;
				  	case 3:
				  		   dayname = "Wednesday";
				  		   break;
				  	case 4:
				  		   dayname = "Thursday";
				  		   break;
				  	case 5:
				  		   dayname = "Friday";
				  		   break;
				  	case 6:
				  		   dayname = "Saturday";
				  		   break;
				  	case 7:
				  		   dayname = "Sunday";
				  		   break;
				  	default:
				  		  dayname = "Invalid Day";
				  		 
				  }
				console.log("Day of the Week ",dayname);

	</script>
</html>
