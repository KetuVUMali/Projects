            function g(name,age)
             {

        // 7. 
             function h(name,age)
             {
                this.name=name;

                this.print=function(){
                    console.log(this.name);
                }
             }
             let m1 = new h("A",1);
             console.log(m1);
             let m2 = new h("B",2);
             console.log(m2);




        // 8. Prototype
            function i(name,age)
             {
                this.name=name;
                this.age=age;
             }
             
             i.prototype.print=function(){
                console.log(this.name);
             }
             
             let k1 = new h("A",1);

             console.log(k2);
