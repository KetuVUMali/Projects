<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Delegation</title>
</head>
<body>
    <h3>
        When event listener through we handle different events.
    </h3>
    <br>
    <div id="parent">                   // parent event handle child event
        <button id="play">Play</button>
        <button id="pause">Pause</button>
    </div>
</body>

<script>
        var parent = document.querySelector('#parent');
        parent.addEventListener("click",function(details)
        {
            if(details.target.id==="play")
            {
                console.log("Play Song");
            }
            else if(details.target.id==="pause")
            {
                console.log("Pause Song");
            }
        })
</script>
</html>
