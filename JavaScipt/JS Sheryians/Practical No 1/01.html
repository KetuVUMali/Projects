<!-- Create a html page with a button. When the button is clicked , change the text of a paragraph element. -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Numquam error quidem 
        necessitatibus. Qui doloremque voluptate provident et. Odit explicabo vero 
        ipsum non nemo voluptas quaerat ea, perferendis atque! Consequuntur, 
        doloremque?
    </p>
    <button> Click</button>
</body>
<script>
        var btn = document.querySelector('button');
        var p =document.querySelector('p');

        btn.addEventListener("click", function(){
            p.textContent="Hii Ketan, I am change pararaph text ";
        })
</script>
</html>
