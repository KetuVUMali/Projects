    <script>
        // multiple inputs store in single var              //////////////////////////////////////////////// 
            var form = document.querySelector('form');
            var h1 = document.querySelector('h1');
            
            var inps = document.querySelectorAll('input[type="text"]');       //Array like structure(node list : only store html tag)
            

            //console.log(input1);
            //console.log(input1.length);

            form.addEventListener('submit',function(eve){
                eve.preventDefault();                                     //preventDefault         
               for(var i=0; i<inps.length; i++)
                {
                    if(inps[i].value.trim() === '')
                     {
                        
                        h1.textContent = "Error, Some Field Is Blank";
                        h1.style.color="red";
                        break;
                     }
                }
            })
    </script>
