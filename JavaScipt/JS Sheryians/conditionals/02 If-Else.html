    <title>If - Else</title>

</body>
<script>

    // 1. 
        var age=20;
        if(age>=18)
        {
            console.log(" Eligibal For Voting...!")
        }
        else
        {
            console.log(" Not Eligibal For Voting...!")
        }


    // 2. 
        if(age>=18) console.log("Eligibal For Voting...!")
        else console.log(" Not Eligibal For Voting...!")


    // 3. if(false){}      
        // following out put if false
        console.log("");
        console.log(Boolean(null));
        console.log(Boolean(" "));
        console.log(Boolean(NaN));
        console.log(Boolean(document.all));
        console.log(Boolean(undefined));
        console.log(Boolean(false));


    // 4. if(true){}
        // following out put if true
        console.log("");
        console.log(Boolean("demo"));
        console.log(Boolean(0.1));
        console.log(Boolean(true));
        
    
    // 5. 
        if(true)
        {
            console.log("");
            console.log("True");
        }


    // 6. 
    if(false)
        {
            console.log("False");
        }
</script>
