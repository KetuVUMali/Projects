<script>

        // 1. 
            function a() {
                return 10;
            }
            var x=a();
            console.log(x);


        // 2. 
            function b() {
                return 11;
            }
            
            console.log(b);   // print all fun

            var y=b()
            console.log(y)   // print fun val

        // 3. 
            function c() {
                return ;
            }
            console.log(c());   // undefine
