                // callback

                function connectToServer(cbfn){
                    console.log("Connecting to server...");
                           setTimeout(function(){
                           console.log("Connected To Server.");
                           cbfn();
                       },2000)
                }

                function fetchCourse(cbnf){
                    console.log("Featching Courses...");
                    setTimeout(()=>{
                        cbnf(["Course 1", "Course 2", "Course 3"]);
                    },2000)
                }
                
                connectToServer(function(){
                    fetchCourse(function(data){
                        console.log(data);
                    });
                  });
