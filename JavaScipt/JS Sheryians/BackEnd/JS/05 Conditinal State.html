<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

<body>
    <pre>
        Conditional Staements 
                                1. if 
                                2. if else 
                                3. if else if      // +++


                                *ternary Opc       // +++
    </pre>
</body>

<script>

            // 1.  if
                // true   =>  true, number (except zero), string (" ")
                if(12)                                                    // true   (if)
                {
                    console.log("True")
                }
                else
                 {
                    console.log("False")
                 }


                // falsly  =>  0, undefine, null, NaN, document.all, false, ""
                if(0)                                                   // False
                 {
                    console.log("True")
                 }
                 else
                 {
                    console.log("False")
                 }





            // 2. if else if 

                if(12>13)
                  {
                    console.log("A Big")
                  }
                else if (13>14)
                  {
                    console.log("B Big")
                  }
                else if (15>13)                     // C Big
                   {
                    console.log("C Big")
                   }
                else
                   {
                    console.log("D Big")
                   }



            // ternary Opc
                 //  (condition) ? true : false ;

                 (12>13) ? "A Big" : " B Big";      //  B Big


</script>    
</html>
