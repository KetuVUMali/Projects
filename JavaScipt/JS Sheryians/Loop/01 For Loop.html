<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For Loop</title>
</head>
<body>
    
    for(Start ; End ; Change)
    
</body>
<script>


    // 1.
        var num;
        for(num=1; num<=5; num++)
        {
            console.log(num);
        }

    // 2.
        var num2;
        for(num2=5; num2>=1; num2--)
        {
            console.log(num2);
        }


    // 3.
        
        for(var num=1; num<=10; num+=2)
        {
            console.log(num);
        }
</script>
</html>
