<!DOCTYPE html>
<html>
<head>
	<title>Box Shadow</title>
	<style type="text/css">
		.class{
			text-align: center;
			margin: auto;
			width: 200px;
			height: 200px;
			border:2px solid black;
			background-color: rgb(100,100,100);
			box-shadow:0px 0px 20px 10px red;
		}
		.class2{
			text-align: center;
			margin: auto;
			width: 200px;
			height: 200px;
			border:2px solid black;
			background-color: rgba(20,20,20,0.4);
			box-shadow: 20px 10px 10px 0px red;
		}
	</style>
</head>
<body>
	<div >
		<div class="class">
			Ketan
		</div>
		<br><br>
		<div class="class2">
			Mali
		</div>
	</div>

</body>
</html>
