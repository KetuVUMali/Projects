<!DOCTYPE html>
<html>
<head>
	<title>Animation Property</title>
	<style type="text/css">
		.boxout1 {
				height: 300px;
				width: 300px;
				border:10px double black;
				margin: auto;
				position: relative;
		       }

		.boxin1{
				height: 100px;
				width: 100px;
				background:red;
				border: 2px solid black;
				position: absolute;
				top: 0px;
				left: 0px;
				animation-name: boxin;
				animation-duration: 5s;
		       }


	</style>
</head>
<body>

	<div class="boxout">
		<div class="boxin">

		</div>
	</div>

</body>
</html>
