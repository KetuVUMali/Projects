<!DOCTYPE html>
<html>
<head>
	<title>Transition Property</title>
	<style type="text/css">
		.ketu{
			margin: auto;
			height: 300px;
			width: 300px;
			background-color: rgb(200,0,0);
			transition: 2s;
		}
		.ketu:hover{
			font-size: 70px;
			text-align: center;
			margin-top: 20px;
			opacity: 0.4;
		}
	</style>
</head>
<body>

	<div class="ketu"> hellow</div>
</body>
</html>
