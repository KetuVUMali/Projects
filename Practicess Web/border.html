<!DOCTYPE html>
<html>
<head>
	<title>Border Tag</title>
	<style type="text/css">
		.ketu{
			height: 200px;
			width: 200px;
			border: 2px solid red;
		}
		.mali{
			height: 200px;
			width: 200px;
			border: 2px double blue;
			border-width: 10px;
		
		}

	</style>
</head>
<body> <div>
		<div class="ketu">Ketan</div>
		<hr>
		<div class="mali">Mali</div>
	   </div>
</body>
</html>
