<!DOCTYPE html>
<html>
<head>
	<title>Transform</title>
	<style type="text/css">
		.main{
			margin: auto;
			margin-top: 100px;
			height: 200px;
			width: 200px;
			background-color: rgba(200,0,0,0.5);
			box-shadow:17px 11px 15px 16px #2b2626;;
			transform: translate(343px,271px);
			transform: skew(139deg,37deg);
			transform: rotate(50deg);
			transform: scale(1);

		}
	</style>
</head>
<body>
	<div class="main">Scale</div>

</body>
</html>
