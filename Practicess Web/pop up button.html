<!DOCTYPE html>
<html>
<head>
	<title>Add To Cart Botton</title>
	<style type="text/css"> 

		.class{
			height:400px;
			width: 400px;
			border:2px solid black;
			margin: auto;
			margin-top: 100px; 
			
		}
		.button{
			width:100%;
			height: 30px;
			color: white;
			position: absolute;
			left: 0px;
			bottom: 40px;
			opacity: 0;
			transition: 1s;
			background-color: rgba(200,0,0,0.4);
		}
		.box:hover.add{
			bottom: 0px;
			opacity: 1;

		}
	</style>
</head>
<body>
		<div class="class">
			
			<img src="Sample.jpg" width="100%" height="100%">
			<input type="button" name="Add To Cart" Value="Add To Cart" class="button">
		</div>
</body>
</html>
